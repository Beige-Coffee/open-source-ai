  - slug: apple-pcc
    name: Apple Private Cloud Compute
    layers: [identity-trust]
    license: Proprietary
    focus: proprietary
    maturity: stable
    url: "https://security.apple.com/blog/private-cloud-compute/"
    description: "Apple's verifiable cloud inference architecture; Secure Enclave anchored; published security guarantees."
    explainer: |
      Private Cloud Compute (PCC) is Apple's architecture for running
      Apple Intelligence requests that exceed on-device capability,
      while preserving the security and privacy posture of the
      on-device case. Proprietary. The core technical claim: every
      server image is signed and attested, Apple itself cannot
      retrieve user data, and security researchers can verify by
      inspecting the production binaries (which are published) and
      comparing against attestation.

      PCC matters because it is the most technically-detailed public
      account of a production confidential-AI deployment from any
      large vendor. Compared to siblings: NVIDIA H100 Confidential
      Computing (TEE-based, vendor-specific, requires NVIDIA), Phala
      Network (TEE-as-a-service marketplace), AWS Nitro Enclaves and
      similar hyperscaler offerings, ZKML approaches like EZKL
      (silicon-agnostic but slow). PCC's distinctive angle is the
      systems-design depth: Apple published the full architecture
      including the threat model, the attestation chain, and the
      researcher-verifiable production-build commitment.

      Production-ready and shipping at consumer scale since 2024
      across the Apple Intelligence rollout. Reverse engineering by
      independent security researchers has been broadly consistent
      with Apple's published claims, though the verification depends
      on Apple's continued cooperation and key custody. Strategic
      significance: PCC is the existence proof that "verifiable
      private inference at scale" is technically achievable. The
      sovereignty critique is that it works for Apple users
      specifically, and the rest of the market has nothing
      comparable.
    sources:
      - title: "Apple Private Cloud Compute (security.apple.com)"
        url: "https://security.apple.com/blog/private-cloud-compute/"
      - title: "PCC Security Documentation"
        url: "https://security.apple.com/documentation/private-cloud-compute"
