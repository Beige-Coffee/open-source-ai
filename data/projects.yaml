  - slug: openhands
    name: OpenHands
    layers: [agents]
    license: MIT
    focus: open
    maturity: stable
    url: "https://all-hands.dev/"
    github: "https://github.com/All-Hands-AI/OpenHands"
    description: "Formerly OpenDevin; sandboxed open coding agent; strong SWE-bench Verified performance."
    explainer: |
      OpenHands (formerly OpenDevin) is an open-source coding agent
      with a sandboxed execution environment. MIT-licensed. The agent
      runs commands inside a Docker sandbox, edits files, navigates
      a codebase, runs tests, and iterates. Architectural inspiration
      from Cognition Labs's Devin announcement, but built entirely
      in the open and led by an academic collaboration (UIUC, CMU,
      others).

      OpenHands matters because it is the strongest fully-open
      coding agent with a sandboxed execution loop. Strong SWE-bench
      Verified scores against the major closed competitors. Compared
      to siblings: Goose (extension-based, more about general agentic
      tooling than just coding; AAIF-housed), Aider (terminal-native,
      simpler design, very loved), Cline and Continue (VS Code-native).
      Closed counterparts: Claude Code, Devin, Cursor's agent mode.
      OpenHands's distinctive angle is "the open Devin": full agentic
      coding loop with execution, not just chat-and-suggest.

      Production-ready and used by developers running it locally and
      teams running it in CI-style flows. Available as a Docker image,
      a hosted service, and via the All Hands AI cloud. The strategic
      question for OpenHands and the open-coding-agent category
      generally: can they keep up with the rapid feature pace of the
      closed alternatives (Cursor and Claude Code in particular),
      especially on the polish-and-defaults dimension where closed
      products usually win.
    sources:
      - title: "OpenHands Documentation"
        url: "https://docs.all-hands.dev/"
      - title: "OpenHands on GitHub"
        url: "https://github.com/All-Hands-AI/OpenHands"
      - title: "OpenHands Paper (Open Platform for AI Software Developers)"
        url: "https://arxiv.org/abs/2407.16741"

  - slug: aider
    name: Aider
    layers: [agents]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://aider.chat/"
    github: "https://github.com/Aider-AI/aider"
    description: "Paul Gauthier's terminal-native open coding agent; BYOK; git-aware diffs; widely loved for its directness."
    explainer: |
      Aider is a terminal-native open coding agent built by Paul
      Gauthier. Apache 2.0. Architectural choices that make it
      distinctive: BYOK on the model (any OpenAI / Anthropic /
      OpenRouter / local provider), git-aware (every edit becomes a
      proper git commit, so the user always has an undo), no
      sandbox (runs against your real working tree by design), and
      a deliberately small surface area (do one thing well: edit
      code based on conversation).

      Aider matters because it is the most-loved minimal open coding
      agent. The design philosophy is "smallest sharp tool that
      works"; the project consistently lands near the top of
      community SWE-bench-style leaderboards despite shipping less
      machinery than the bigger frameworks. Compared to siblings:
      OpenHands (more elaborate, sandboxed, more feature surface),
      Goose (extension-based, broader scope than just coding), Cline
      / Continue (IDE-integrated). Aider's distinctive angle is the
      terminal-first, git-as-undo, do-one-thing-well stance.

      Production-ready and widely used by developers who prefer the
      terminal over an IDE, by anyone wanting a model-agnostic coding
      agent without a hosted service in the loop, and by users on
      Mac / Linux who want something that works against local models
      via Ollama. The community is active, the maintainer is
      responsive, and the project's small surface keeps it healthy
      to maintain. A frequent recommendation when "what should I
      use as a starting point for AI-assisted coding" comes up.
    sources:
      - title: "Aider Documentation"
        url: "https://aider.chat/docs/"
