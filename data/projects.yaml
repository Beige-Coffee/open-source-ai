  - slug: nous-distro
    name: Nous Research DisTrO
    layers: [training, sovereignty-decentralization]
    license: Apache 2.0
    focus: open
    maturity: research
    url: "https://nousresearch.com/"
    description: "Decentralized training optimizer that reduces gradient-sync bandwidth 100-1000x; enables training over commodity internet."
    explainer: |
      DisTrO (Distributed Training Over-the-Internet) is a family of
      bandwidth-efficient training optimizers from Nous Research. The
      central idea: instead of synchronizing full-precision gradients
      between workers each step (which requires hyperscaler-class
      networking), use lossy compression of gradient updates.
      Reductions on the order of 100-1000x in inter-node bandwidth
      with acceptable convergence.

      DisTrO matters because it is the strongest open candidate for
      training-over-commodity-internet, which is the foundation any
      serious decentralized-training story needs. Compared to
      siblings: Prime Intellect's `prime` framework (similar overall
      goal, used in INTELLECT-1 and INTELLECT-2; some technical
      overlap), Pluralis (different topology approach), Gensyn
      (cryptographic verification angle, less mature on the
      bandwidth-efficiency side).

      Production-readiness: research-to-pilot. The technique works at
      modest scale and has shipped reproducible results; whether it
      scales to true frontier (1T+ parameters) over the public
      internet is the open question. Used in Nous Research's own
      training experiments and increasingly cited in the broader
      decentralized-training literature. Honest limit: an order of
      magnitude behind centralized frontier training on iso-cost,
      iso-time. The interesting role for DisTrO is enabling models
      that simply could not exist otherwise (community-trained,
      regional, sovereignty-anchored), not racing the frontier.
    sources:
      - title: "Nous Research"
        url: "https://nousresearch.com/"
      - title: "DisTrO on GitHub"
        url: "https://github.com/NousResearch/DisTrO"
      - title: "DisTrO Technical Report"
        url: "https://github.com/NousResearch/DisTrO/blob/main/A_Preliminary_Report_on_DisTrO.pdf"

  # Weights
  - slug: llama
    name: Llama (Meta)
    layers: [weights]
    license: Llama Community License
    focus: source-available
    maturity: stable
    url: "https://ai.meta.com/llama/"
    description: "Meta's open-weights family; dominant in usage; license carries a 700M-MAU clause and acceptable-use restrictions."
    explainer: |
      Llama is Meta's open-weights model family. Llama 1 (Feb 2023,
      research-only), Llama 2 (Jul 2023, first commercial release),
      Llama 3 (Apr 2024), Llama 3.1 (Jul 2024 with 405B), Llama 3.3
      70B (Dec 2024). The model files are downloadable; the license
      is the Llama Community License, not an OSI-approved open-source
      license.

      Llama matters because it is the most-downloaded open-weights
      family by a wide margin and the practical foundation for most
      open AI work in 2023-2025. The Open Source Initiative's
      published position is that Llama is NOT open source under their
      definition, citing the license's field-of-use discrimination
      (the 700M-MAU clause that requires Meta's separate license for
      large competitors), the unilateral acceptable-use policy, and
      the no-competing-models clause. Compared to siblings: Mistral
      (smaller models historically Apache 2.0, flagships drifting to
      restrictive terms), Qwen (often Apache 2.0 across sizes, very
      open posture), DeepSeek (MIT, open posture), OLMo (truly open
      including data and code, smaller capability ceiling).

      Production-ready and dominant in deployment count. The honest
      framing: "open weights" is necessary but not sufficient for
      sovereign AI; the question is which license you actually got.
      Llama's license is conditionally permissive and Meta-controlled,
      not durably open. For the operative analysis of which clauses
      actually bind in your situation, see the OSI's annotated take.
    sources:
      - title: "Llama at Meta AI"
        url: "https://ai.meta.com/llama/"
      - title: "Llama Community License Text"
        url: "https://www.llama.com/llama3/license/"
      - title: "OSI: Meta Llama License Still Not Open Source"
        url: "https://opensource.org/blog/meta-llama-license-still-not-open-source"
      - title: "Llama 3 Herd of Models (Meta AI, 2024)"
        url: "https://arxiv.org/abs/2407.21783"

  - slug: mistral
    name: Mistral / Mixtral
    layers: [weights]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://mistral.ai/"
    description: "French lab; older open releases under Apache 2.0; flagships increasingly API-only or under research-tier licenses."
    explainer: |
      Mistral AI is a French frontier-AI startup founded in 2023 by
      researchers from Meta and Google DeepMind. The early releases
      (Mistral 7B in 2023, Mixtral 8x7B in late 2023, Mixtral 8x22B
      in 2024) shipped under Apache 2.0 and reset the open-weights
      capability ceiling for several months. Mistral 7B in particular
      established the "small model that punches above its weight"
      pattern that subsequent open-weights releases iterated on
      (sliding-window attention, grouped-query attention).

      Mistral matters for two reasons. First, it is the credible
      European frontier-AI presence; sovereignty conversations in the
      EU specifically often cite Mistral as the existence proof that
      European AI does not have to depend on US labs. Second, the
      drift in their licensing posture is the canonical example of
      "open at the start, restrictive at the flagship" that other
      open-weights labs have followed. Mistral Large, their most
      capable model, is API-only and not open-weights. Compared to
      siblings: Llama (similar drift), Qwen (more durably open),
      DeepSeek (similar Mistral-style openness for the moment), OLMo
      (truly open across data and code).

      Production-readiness varies by tier. The Apache 2.0 small
      models are durable and widely deployed. The flagship API-only
      models compete with closed peers (Claude, GPT) but lock you
      into Mistral's roadmap if you depend on them. Strategic
      question for Mistral: does the European-sovereignty pitch
      sustain the company without the open releases that built its
      reputation in the first place?
    sources:
      - title: "Mistral AI"
        url: "https://mistral.ai/"
      - title: "Mistral 7B Paper"
        url: "https://arxiv.org/abs/2310.06825"
      - title: "Mixtral of Experts (Mixtral 8x7B paper)"
        url: "https://arxiv.org/abs/2401.04088"
      - title: "Mistral Models on HuggingFace"
        url: "https://huggingface.co/mistralai"

  - slug: qwen
    name: Qwen (Alibaba)
    layers: [weights]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://qwenlm.github.io/"
    description: "Alibaba's aggressive open-weights series (Qwen 2.5 / 3); Apache 2.0 across most sizes; full-precision weights available."
    explainer: |
      Qwen is Alibaba Cloud's model family. Qwen 2.5 (late 2024) and
      Qwen 3 (2025) shipped a wide range of sizes (0.5B to 72B+)
      under Apache 2.0, including specialty variants for code, math,
      and very-long-context. Qwen has been notably aggressive at the
      open-permissive end: full-precision weights, Apache 2.0 across
      most sizes, no field-of-use restrictions like Llama's MAU
      clause.

      Qwen matters because it has emerged as the most-downloaded open-
      weights family in 2025-2026, displacing Llama at the top of
      HuggingFace's monthly download counts in many months. The
      capability is competitive with Llama and Mistral peers at the
      same size class. Compared to siblings: Llama (similar size
      coverage but the Community License is restrictive), DeepSeek
      (MIT, frontier-class reasoning, similar open posture but
      smaller release cadence), Mistral (early Apache 2.0 then drift),
      OLMo (truly open including data, smaller capability ceiling).
      Qwen's distinctive angle is "Apache 2.0 across the family
      including the flagships, with strong math and code variants."

      Production-ready and widely deployed in 2026. Used as the base
      for many fine-tunes on HuggingFace; the long-context Qwen
      variants are popular for retrieval-heavy use. Strategic
      question: does Qwen's open posture survive future regulatory
      pressure on Chinese AI exports, and does the West's "do we
      trust models from a Chinese lab" debate affect adoption.
    sources:
      - title: "Qwen on GitHub (QwenLM)"
        url: "https://github.com/QwenLM"
      - title: "Qwen2.5 Technical Report"
        url: "https://arxiv.org/abs/2412.15115"
      - title: "Qwen Models on HuggingFace"
        url: "https://huggingface.co/Qwen"

  - slug: deepseek
    name: DeepSeek V3 / R1
    layers: [weights]
    license: MIT
    focus: open
    maturity: stable
    url: "https://www.deepseek.com/"
    description: "Cost-quality reset; V3 papers documented architectural innovations (MoE, MLA, aux-loss-free MoE); R1 open reasoning model."
    explainer: |
      DeepSeek is a Chinese frontier-AI lab. Their open releases
      reset two ceilings in late 2024-early 2025. DeepSeek-V3 (Dec
      2024) demonstrated frontier-class capability trained for an
      order of magnitude less than US frontier labs were spending,
      using a Mixture-of-Experts architecture with multiple
      architectural innovations (Multi-head Latent Attention,
      auxiliary-loss-free MoE balancing). DeepSeek-R1 (Jan 2025) was
      the first openly-released frontier-class reasoning model, with
      R1-Zero showing that pure reinforcement-learning post-training
      could produce strong reasoning without the typical SFT step.

      DeepSeek matters because it forced a re-evaluation of what
      open-weights labs can accomplish on a constrained compute
      budget. Compared to siblings: Llama (similar capability ceiling
      but restrictive license vs DeepSeek's MIT), Qwen (similar
      Chinese-lab open posture but different architectural choices),
      OLMo (truly open including data, smaller capability ceiling).
      DeepSeek's distinctive angle is "frontier capability on
      permissive license (MIT), at a cost structure that breaks the
      hyperscaler-budget assumption."

      Production-ready; widely served by hosted-inference providers
      and self-hosters. Subsequent V3.1 (mid-2025) introduced hybrid
      reasoning (one model with thinking and non-thinking modes).
      Caveats: training data is not disclosed (does not satisfy
      strict OSAID), and the trust questions about data provenance
      and political content filtering apply as they do to any closed-
      data lab.
    sources:
      - title: "DeepSeek"
        url: "https://www.deepseek.com/"
      - title: "DeepSeek-V3 Technical Report"
        url: "https://arxiv.org/abs/2412.19437"
      - title: "DeepSeek-R1 Reasoning Paper"
        url: "https://arxiv.org/abs/2501.12948"
      - title: "DeepSeek Models on HuggingFace"
        url: "https://huggingface.co/deepseek-ai"

  - slug: olmo
    name: OLMo (AI2)
    layers: [weights, data]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://allenai.org/olmo"
    description: "The only major model family meeting the strictest reading of OSAID: data (Dolma), training code, and weights all published."
    explainer: |
      OLMo is a family of open language models from the Allen Institute
      for AI (AI2). What makes OLMo distinctive is not the capability
      ceiling, which is below the frontier, but the disclosure depth.
      Apache 2.0 weights, full training data (Dolma corpus), training
      code, evaluation suite, intermediate checkpoints, and training
      logs are all published. The training pipeline is reproducible
      end-to-end. No other major model family in 2026 meets this bar.

      OLMo matters because it answers the question "what does 'open
      source AI' actually look like at the strictest reading of OSAID
      v1.0?" Llama, Mistral, Qwen, DeepSeek, and Gemma all publish
      weights, but the training data is closed for all of them. Under
      the Open Source Initiative's published definition, only OLMo
      qualifies as fully open. This makes OLMo the existence proof
      that frontier-class training-data disclosure is feasible at all,
      and the reference example anyone arguing for stricter open-AI
      definitions can point to.

      Production-ready as a research and reference model. OLMo 2 (32B,
      Mar 2025) and OLMo 3 family (Nov 2025) closed much of the
      capability gap with similar-size open-weights peers, though not
      with the frontier. Strong for academic use, reproducibility
      research, post-training experimentation. Less competitive with
      Llama 3 / Qwen 3 / DeepSeek for raw application performance.
      Stewarded by AI2; long-term direction depends on AI2's continued
      funding for the program.
    sources:
      - title: "OLMo at AI2"
        url: "https://allenai.org/olmo"
      - title: "OLMo 2 Release"
        url: "https://allenai.org/blog/olmo2"
      - title: "Dolma Corpus"
        url: "https://huggingface.co/datasets/allenai/dolma"
