  # Agents
  - slug: goose
    name: Goose (Block)
    layers: [agents]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://block.github.io/goose/"
    github: "https://github.com/block/goose"
    description: "Block's open agent; under the Linux Foundation's AAIF since Dec 2025; MCP-native; BYOK; extension-based."
    explainer: |
      Goose is an on-machine, open agent originally built at Block.
      Apache 2.0. Extension-based architecture: capabilities are added
      as MCP servers the agent connects to at runtime. BYOK on the
      model side: it works with any Anthropic / OpenAI / OpenRouter
      provider, plus local models via Ollama. Donated to the Linux
      Foundation's Agentic AI Foundation (AAIF) in December 2025 as
      part of the founding cohort alongside MCP itself.

      Goose matters because the agent layer is where most user-visible
      AI lives in 2026, and where most users meet AI through closed
      products (Claude Code, Cursor, Devin). An open, extension-based,
      BYOK, on-machine agent is the structural counter-bet. Compared
      to siblings: OpenHands is the strongest open coding agent with
      a sandboxed execution environment; Aider is the minimal terminal-
      native coding agent that many people love for being simple;
      Cline and Continue are VS Code-native open agents. Goose's
      distinctive angle is its origins at Block (cypherpunk-adjacent)
      and its explicit positioning as the "agent you run, not the
      agent that runs you."

      Production-ready as of 2025. Used by Block internally and by
      thousands of external developers; Databricks bundles it. Block
      runs a grant program (up to $100K) for external builders
      extending Goose with new integrations or tooling.
    sources:
      - title: "Goose Documentation"
        url: "https://block.github.io/goose/"
