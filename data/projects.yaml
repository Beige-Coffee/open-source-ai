  - slug: apple-silicon
    name: Apple Silicon (M-series)
    layers: [silicon, runtime]
    license: Proprietary
    focus: proprietary
    maturity: stable
    url: "https://www.apple.com/mac/m4-pro/"
    description: "Unified memory architecture; closed silicon, but the strongest on-device inference platform via llama.cpp and MLX."
    explainer: |
      Apple's M-series chips (M1, M2, M3, M4 across Pro, Max, Ultra
      tiers) are SoCs designed for laptops and desktops. Closed
      silicon on a custom ARM-based ISA, closed accelerator (the
      Neural Engine plus the GPU). What makes them load-bearing for
      open-source AI is the unified memory architecture: CPU, GPU,
      and Neural Engine share the same physical memory, so a 192GB
      Mac Studio has 192GB of "VRAM" for inference purposes.

      For local AI specifically (single user, batch size 1), inference
      is bandwidth-bound: tokens per second is capped by memory
      bandwidth divided by model size in bytes. Apple's wide LPDDR5X
      bus delivers 273-800 GB/s depending on tier (M4 Pro to M2/M3
      Ultra). That, combined with high memory capacity, makes Macs
      the only consumer hardware on the market that can hold a 70B
      model and run it at usable speed. NVIDIA's consumer cards
      (4090, 5090) cap memory capacity well below what 70B models
      need. AMD's Strix Halo (96GB unified memory) is the first
      credible non-Apple alternative.

      Production-ready and the de facto local-AI substrate in 2026.
      Used by llama.cpp (Apple Silicon backend is among the most
      optimized), Ollama (which wraps llama.cpp), and MLX (Apple's
      open ML framework specifically targeting Apple Silicon). The
      sovereignty critique: Apple's closed-everything ecosystem
      means "local AI on a Mac" still ties you to Apple's hardware
      and software roadmap. Genuinely open local-AI silicon at this
      capability remains a future bet (Tenstorrent, Strix Halo).
    sources:
      - title: "Apple M4 Pro / Max Specifications"
        url: "https://www.apple.com/newsroom/2024/10/new-macbook-pro-features-m4-family-of-chips-and-apple-intelligence/"
      - title: "Apple MLX Framework"
        url: "https://github.com/ml-explore/mlx"
      - title: "llama.cpp (Apple Silicon backend)"
        url: "https://github.com/ggml-org/llama.cpp"

  # Compute
  - slug: akash
    name: Akash Network
    layers: [compute]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://akash.network/"
    github: "https://github.com/akash-network/node"
    description: "Cosmos-based decentralized GPU and CPU marketplace; AKT token; reverse-auction matching."
    explainer: |
      Akash is a decentralized compute marketplace built on the Cosmos
      SDK. Providers (anyone with spare GPUs or CPUs) list capacity;
      tenants (anyone with workloads) submit bids; a reverse-auction
      mechanism matches them. Settlement happens in the AKT token.
      The whole stack is open source under Apache 2.0; the network is
      permissionless.

      Akash matters because it is the longest-running, most-mature
      decentralized compute marketplace. Compared to siblings: io.net
      (Solana-based, more focused on GPU aggregation), Hyperbolic
      (marketplace + hosted inference), Bittensor compute subnets
      (TAO-incentivized, tighter coupling to model training), Gensyn
      (cryptographic verification of compute, earlier stage). Akash's
      distinctive angle is the longer track record, the reverse-auction
      mechanism (tenants set max price, providers compete down), and
      first-mover position in the Cosmos ecosystem.

      Production-ready for inference workloads at small-to-medium
      scale. Used by hosted-inference providers and self-hosters who
      want non-hyperscaler GPU access. Limits: bandwidth and cross-
      provider coordination make Akash unsuited to frontier-scale
      training; spot-availability and SLA characteristics are looser
      than AWS / Lambda / CoreWeave. The strategic question for
      decentralized compute generally (Akash included) is whether
      tooling matures enough to bridge the experiment-vs-production
      gap.
    sources:
      - title: "Akash Network Documentation"
        url: "https://akash.network/docs/"
      - title: "Akash on GitHub"
        url: "https://github.com/akash-network/node"
      - title: "AKT Tokenomics"
        url: "https://akash.network/token/"

  - slug: io-net
    name: io.net
    layers: [compute]
    license: Source-available
    focus: source-available
    maturity: beta
    url: "https://io.net/"
    description: "Solana-based aggregator of decentralized GPU supply; IO token; pulls from underutilized DePIN networks."

  - slug: bittensor-compute
    name: Bittensor Compute (Subnet 27 etc.)
    layers: [compute]
    license: Apache 2.0
    focus: open
    maturity: beta
    url: "https://bittensor.com/"
    github: "https://github.com/opentensor/bittensor"
    description: "TAO-incentivized compute subnets inside the Bittensor protocol; emission-based rewards."
    explainer: |
      Bittensor is a peer-to-peer protocol with a token-incentive
      design (TAO) and a subnet architecture: each subnet defines a
      task, miners compete to do that task well, validators score the
      results, and TAO emissions reward both. Compute-focused subnets
      let miners contribute GPU cycles for various AI workloads;
      Subnet 27 is the canonical compute subnet, and several others
      focus on training, inference, or specialized compute.

      Bittensor matters because it is the only decentralized AI
      protocol that has shipped a working token-incentivized network
      operating continuously since 2021. Compared to Akash (compute
      marketplace, reverse-auction settlement) Bittensor's compute
      subnets offer emission-based rewards: miners contribute
      capacity and earn TAO from the protocol's emission schedule
      rather than from direct payments. That makes the economics
      different (and more crypto-native).

      Production-readiness varies sharply by subnet. The protocol
      itself is mature; individual subnets range from research-grade
      to actively-deployed. Used by Templar (subnet that ran a 72B
      distributed pretrain from scratch) and various inference and
      training experiments. Limits: TAO economics are volatile,
      subnet quality is uneven, and the path from "miner contributing
      compute" to "stable production workload" still has friction.
    sources:
      - title: "Bittensor Documentation"
        url: "https://docs.bittensor.com/"
      - title: "Bittensor Whitepaper"
        url: "https://bittensor.com/whitepaper"
      - title: "Bittensor on GitHub"
        url: "https://github.com/opentensor/bittensor"

  - slug: hyperbolic
    name: Hyperbolic
    layers: [compute]
    license: Source-available
    focus: source-available
    maturity: beta
    url: "https://hyperbolic.xyz/"
    description: "Marketplace plus hosted inference; decentralized supply, hosted UX."

  - slug: gensyn
    name: Gensyn
    layers: [compute, sovereignty-decentralization]
    license: Apache 2.0
    focus: open
    maturity: research
    url: "https://www.gensyn.ai/"
    description: "Decentralized training network with cryptographic verification of compute (proof-of-learning); Ethereum-based."

  - slug: coreweave
    name: CoreWeave
    layers: [compute]
    license: Proprietary
    focus: proprietary
    maturity: stable
    url: "https://www.coreweave.com/"
    description: "Dedicated AI cloud; bellwether for AI-capex; closed but commodity-ish in pricing."

  - slug: prime-intellect
    name: Prime Intellect
    layers: [compute, sovereignty-decentralization, training]
    license: Apache 2.0
    focus: open
    maturity: research
    url: "https://www.primeintellect.ai/"
    github: "https://github.com/PrimeIntellect-ai/prime"
    description: "Distributed training framework and compute aggregation (INTELLECT-1, INTELLECT-2)."
    explainer: |
      Prime Intellect is a startup focused on decentralized training
      of frontier-scale AI models. They aggregate compute across
      providers (their own and partners) and ship open frameworks for
      bandwidth-efficient distributed training over the public
      internet. Their `prime` repo packages the training stack.

      Prime Intellect matters because they are the leading datapoint
      on whether you can train a competitive open-weights model
      without a hyperscaler-class cluster. INTELLECT-1 (released
      November 2024) was the first reproducible decentralized pretrain
      of a 10B+ model across continents. INTELLECT-2 (mid-2025)
      followed at 32B with reinforcement-learning post-training
      distributed globally. Compared to other distributed-training
      bets: Nous Research (DisTrO optimizer, similar bandwidth-
      efficient theme), Templar (Bittensor subnet that ran a 72B
      distributed pretrain), Pluralis and Gensyn (earlier-stage with
      different technical approaches).

      Production-readiness is research-to-pilot. The technique works
      and ships models; the honest ceiling is roughly an order of
      magnitude behind centralized frontier training on iso-cost,
      iso-time. Prime Intellect's strategic angle is "make distributed
      training real, then push toward parity." Funded by venture
      capital plus partnerships; the open framework is independent of
      the company's commercial roadmap.
    sources:
      - title: "Prime Intellect"
        url: "https://www.primeintellect.ai/"
      - title: "INTELLECT-1 Release Post"
        url: "https://www.primeintellect.ai/blog/intellect-1-release"
      - title: "INTELLECT-2 Announcement"
        url: "https://www.primeintellect.ai/blog/intellect-2"
      - title: "prime framework on GitHub"
        url: "https://github.com/PrimeIntellect-ai/prime"

  # Data
  - slug: common-crawl
    name: Common Crawl
    layers: [data]
    license: Standard
    focus: open
    maturity: stable
    url: "https://commoncrawl.org/"
    description: "Non-profit petabyte-scale monthly web crawl since 2008; the substrate underneath nearly every open AI corpus."

  - slug: fineweb
    name: FineWeb / FineWeb-Edu
    layers: [data]
    license: ODC-By 1.0
    focus: open
    maturity: stable
    url: "https://huggingface.co/datasets/HuggingFaceFW/fineweb"
    description: "HuggingFace 15T-token filtered Common Crawl; FineWeb-Edu is the higher-quality educational subset."
    explainer: |
      FineWeb is HuggingFace's open pretraining dataset. ~15 trillion
      tokens after filtering Common Crawl with a series of quality
      classifiers and dedup steps. Released under ODC-By 1.0 (Open
      Data Commons attribution license). FineWeb-Edu is a higher-
      quality educational subset filtered with an LLM classifier;
      smaller (~1.3T tokens) but reliably stronger for training small-
      to-mid models. FineWeb 2 (late 2024) extended the work to
      multilingual coverage across ~1000 languages.

      FineWeb matters because data-filtering is where the open-data
      ecosystem has caught up most visibly to closed-data labs. The
      released ablations show that careful filtering of Common Crawl
      can produce a corpus that trains models competitive with what
      the closed labs publish, at sizes where the comparison is
      possible. Compared to siblings: The Pile (foundational, smaller),
      Dolma (AI2, OLMo's training corpus), DCLM (open competitive
      benchmark for filtering methodology), Common Pile (license-clean
      angle), RedPajama (open Llama 1 replication corpus). FineWeb is
      the largest of the well-documented open corpora and the one
      modern open-weights training runs most often start from.

      Production-ready and used by many open-weights training projects
      in 2024-2026. The catch: it is not license-clean (ODC-By does
      not solve the underlying copyright question for web-scraped
      content), so it does not satisfy the strictest reading of
      open-source AI. For that, see Common Pile.
    sources:
      - title: "FineWeb on HuggingFace"
        url: "https://huggingface.co/datasets/HuggingFaceFW/fineweb"
      - title: "FineWeb Blog Post (HuggingFace)"
        url: "https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1"
      - title: "FineWeb-Edu Dataset"
        url: "https://huggingface.co/datasets/HuggingFaceFW/fineweb-edu"
      - title: "FineWeb 2 Multilingual"
        url: "https://huggingface.co/datasets/HuggingFaceFW/fineweb-2"

