  # Sovereignty and decentralization
  - slug: intellect-1
    name: Prime Intellect INTELLECT-1
    layers: [sovereignty-decentralization, training]
    license: Apache 2.0
    focus: open
    maturity: research
    url: "https://www.primeintellect.ai/blog/intellect-1"
    description: "10B-parameter model trained across distributed compute via the PRIME framework; first public proof that decentralized frontier-ish training is feasible."
    explainer: |
      INTELLECT-1 is a 10B-parameter language model that Prime
      Intellect trained across distributed compute spanning multiple
      continents, released November 2024. Apache 2.0. The training
      run used Prime Intellect's PRIME framework with bandwidth-
      efficient gradient synchronization to make training over
      commodity internet links practical at this scale. The model
      itself is open-weights with full training methodology published.

      INTELLECT-1 matters because it is the first reproducible public
      proof that decentralized pretraining of a 10B+ model is
      feasible at all. Before this, "decentralized training" was
      mostly theoretical. INTELLECT-1 was followed by INTELLECT-2
      (32B with reinforcement-learning post-training) in 2025. Compared
      to siblings: Templar Covenant-72B (Bittensor subnet, larger
      model, different incentive design), Pluralis and Gensyn
      (earlier-stage research bets with distinct technical approaches),
      Nous Research's DisTrO (the bandwidth-efficient optimizer
      family used by several of these projects).

      Production-readiness: the model itself is shipped and usable;
      the methodology is reproducible by anyone with similar compute
      partners; capability remains a generation behind centralized
      frontier training at iso-cost. The interesting role for
      INTELLECT-1 is not to compete with frontier labs on raw
      capability but to show that an alternative training topology
      is technically possible. Strategic significance for the
      sovereignty conversation: a community that wants a model
      independent of any hyperscaler relationship now has a concrete
      template to follow.
    sources:
      - title: "INTELLECT-1 Release Post (Prime Intellect)"
        url: "https://www.primeintellect.ai/blog/intellect-1-release"
      - title: "INTELLECT-1 Technical Report"
        url: "https://www.primeintellect.ai/blog/intellect-1"
      - title: "INTELLECT-1 on HuggingFace"
        url: "https://huggingface.co/PrimeIntellect/INTELLECT-1-Instruct"

  - slug: templar-covenant-72b
    name: Templar Covenant-72B
    layers: [sovereignty-decentralization, training]
    license: Apache 2.0
    focus: open
    maturity: research
    url: "https://github.com/tplr-ai/templar"
    description: "Bittensor subnet for decentralized training; produced Covenant-72B in 2026; on-chain coordination plus incentivized compute."
    explainer: |
      Templar is a Bittensor subnet that ran a 72-billion-parameter
      language model pretraining from scratch across an incentivized
      decentralized network. The training run produced Covenant-72B
      in early 2026. Apache 2.0. The architecture combines on-chain
      coordination (Bittensor subnet for incentive distribution and
      validator scoring) with off-chain bandwidth-efficient training
      (using techniques in the DisTrO / DiLoCo family). Miners
      contribute GPU cycles, validators score contributions, TAO
      emissions reward both.

      Templar matters because it is the most ambitious distributed
      pretraining run to date by parameter count. Compared to
      siblings: INTELLECT-1 (10B, single-org coordination via Prime
      Intellect), INTELLECT-2 (32B, similar coordination), Pluralis
      (different topology, earlier stage). Templar's distinctive
      angle is the combination of token-incentivized contributor
      network (Bittensor) with frontier-ish parameter scale (72B).
      The 72B size matters because it is roughly where Llama 3 70B
      sits, so the comparison to centralized frontier-class open
      weights is direct.

      Production-readiness: research-grade. The training run completed
      and the model is published; whether Covenant-72B competes with
      Llama 3 70B or Qwen 72B on capability benchmarks is the
      operative question, and the published results suggest it
      reaches a credible-but-behind level. Strategic significance:
      this is the existence proof that token-incentivized
      decentralized pretraining can produce a frontier-class-size
      open model, not just a research toy. The honest limit: an
      order of magnitude behind centralized frontier training on
      time-to-result, and dependent on TAO economics continuing to
      reward miners adequately.
    sources:
      - title: "Templar on GitHub"
        url: "https://github.com/tplr-ai/templar"
      - title: "Templar (project page)"
        url: "https://www.tplr.ai/"
      - title: "Bittensor Subnet Architecture"
        url: "https://docs.bittensor.com/learn/subnets-and-blocks"

