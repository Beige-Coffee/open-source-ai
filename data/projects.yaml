  # Protocols
  - slug: mcp
    name: Model Context Protocol (MCP)
    layers: [protocols]
    license: MIT
    focus: open
    maturity: stable
    url: "https://modelcontextprotocol.io/"
    github: "https://github.com/modelcontextprotocol/modelcontextprotocol"
    description: "Anthropic-seeded protocol for tool and context exchange; donated to the Linux Foundation's AAIF Dec 2025; de facto standard."
    explainer: |
      MCP is a wire protocol that lets a model or agent talk to tools
      and context sources in a standardized way. An MCP server exposes
      capabilities (read files, query a database, call an API); an
      MCP client (the model or agent) discovers and invokes them. The
      spec, reference SDKs in TypeScript / Python / Go / Rust, and a
      large community-maintained ecosystem of servers all live in the
      open under MIT. Originally seeded by Anthropic; donated to the
      Linux Foundation's Agentic AI Foundation (AAIF) in December 2025.

      MCP matters because protocols at the integration layer end up
      owning the ecosystem. HTTP, SMTP, BGP, and TCP are the analogous
      historical examples; their openness allowed the internet to be
      a platform anyone could build on. The sibling protocols are A2A
      (Google-seeded, agent-to-agent rather than agent-to-tool;
      complementary not competing) and ACP (less widely adopted). MCP
      has become the de facto standard for tool access by agents in
      2025-2026: supported by Claude Code natively, by Goose, by
      OpenHands, by Cursor, and increasingly by hosted services that
      want to expose themselves as MCP servers.

      Production-ready and broadly deployed. The interesting open
      question is whether MCP's evolution stays community-driven now
      that it sits under AAIF, or whether Anthropic's seeded status
      continues to influence the spec's direction. So far it has been
      treated as a published standard rather than a controlled product.
    sources:
      - title: "MCP Specification (modelcontextprotocol.io)"
        url: "https://modelcontextprotocol.io/"
      - title: "MCP on GitHub"
        url: "https://github.com/modelcontextprotocol"
      - title: "Awesome MCP Servers"
        url: "https://github.com/modelcontextprotocol/servers"
      - title: "AAIF Founding Announcement (Linux Foundation)"
        url: "https://www.linuxfoundation.org/press/linux-foundation-announces-the-formation-of-the-agentic-ai-foundation"

  - slug: a2a
    name: Agent-to-Agent (A2A)
    layers: [protocols]
    license: Apache 2.0
    focus: open
    maturity: beta
    url: "https://a2a-protocol.org/"
    github: "https://github.com/a2aproject/A2A"
    description: "Google-seeded protocol for inter-agent communication; under Linux Foundation; 150+ org signatories."
    explainer: |
      A2A (Agent-to-Agent) is a protocol for inter-agent communication
      seeded by Google in 2024 and donated to the Linux Foundation in
      2025. Where MCP standardizes how an agent talks to tools and
      resources, A2A standardizes how two agents talk to each other:
      capability discovery (each agent publishes a structured
      "agent card" describing what it can do), task delegation, and
      result reporting.

      A2A matters because as agent ecosystems mature, agents will
      increasingly need to negotiate work with other agents rather
      than just call tools. The complementary positioning is the
      important framing: MCP is agent-to-tool, A2A is agent-to-agent,
      and both are needed for a multi-agent ecosystem that is not
      controlled by a single platform. Compared to siblings: MCP is
      the mature complement at the same wire layer; ACP (Agent Client
      Protocol) is an earlier-stage spec focused on agent-to-client
      surfaces (chat UIs, IDEs); various proprietary agent-platform
      protocols exist but lack the open-spec character of A2A.

      Production-readiness: shipping and adopted by a broad signatory
      list including Salesforce, SAP, ServiceNow. Real usage is still
      thinner than MCP usage; the boundary between "this should be an
      MCP server call" and "this should be an A2A agent call" remains
      fuzzy in practice and a topic of ongoing spec discussion. The
      strategic question is whether A2A becomes the durable inter-
      agent layer or whether agent-platform vendors fork their own.
    sources:
      - title: "A2A Protocol"
        url: "https://a2a-protocol.org/"
      - title: "A2A on GitHub"
        url: "https://github.com/a2aproject/A2A"
      - title: "Linux Foundation A2A Announcement"
        url: "https://www.linuxfoundation.org/press/announcing-the-agent2agent-protocol-a2a"

