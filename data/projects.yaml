  - slug: pgvector
    name: pgvector
    layers: [retrieval-memory]
    license: PostgreSQL
    focus: open
    maturity: stable
    url: "https://github.com/pgvector/pgvector"
    github: "https://github.com/pgvector/pgvector"
    description: "Vector similarity search inside PostgreSQL; lets existing Postgres deployments add RAG without a separate database."
    explainer: |
      pgvector is a PostgreSQL extension by Andrew Kane that adds
      vector data types and similarity-search operators to standard
      Postgres. Released under the PostgreSQL license. Once installed,
      you can store vectors alongside any other data in your tables,
      query them with HNSW or IVFFlat indexes, and combine vector
      search with normal SQL filters in one query.

      pgvector matters because most teams deploying RAG do not need
      a dedicated vector database; they need vector search bolted
      onto the database they already run. Compared to siblings:
      Pinecone (closed managed service, fast, no self-host),
      Qdrant / Weaviate / Milvus / Chroma (purpose-built open vector
      DBs, more features and better at billion-scale), LanceDB
      (Lakehouse-style, columnar storage). pgvector's distinctive
      angle is "you already run Postgres; the vector store is one
      extension and one ALTER TABLE away." The boring-tech path.

      Production-ready and widely deployed in 2026. AWS RDS, Supabase,
      Neon, and most managed Postgres providers ship pgvector
      pre-installed. For workloads under ~10M vectors with mixed
      filter-and-search queries, pgvector is the default
      recommendation. The strategic question: as model context
      windows grow (1M+ tokens) and as vector DBs add filtering
      sophistication, the line between "use Postgres + pgvector"
      and "use a dedicated vector DB" keeps moving. pgvector keeps
      winning the small-to-medium case.
    sources:
      - title: "pgvector on GitHub"
        url: "https://github.com/pgvector/pgvector"
      - title: "pgvector Tutorial (Supabase)"
        url: "https://supabase.com/docs/guides/database/extensions/pgvector"
      - title: "pgvector Performance Notes"
        url: "https://github.com/pgvector/pgvector#performance"

  - slug: letta
    name: Letta (formerly MemGPT)
    layers: [retrieval-memory, agents]
    license: Apache 2.0
    focus: open
    maturity: beta
    url: "https://letta.com/"
    github: "https://github.com/letta-ai/letta"
    description: "Memory-stateful agent framework; OS-like memory hierarchy; persistent context across sessions."
    explainer: |
      Letta (formerly MemGPT) is an open framework for building
      stateful AI agents with persistent memory. The original MemGPT
      paper proposed treating an LLM's context window like main
      memory in an operating system: the agent can page memories in
      and out, archive long-term context, and recall it later. Letta
      packages this into a library and an open server with a managed
      cloud option. Apache 2.0.

      Letta matters because the deepest agent lock-in is accumulated
      memory. Closed agents (Claude Code, ChatGPT, Cursor) build
      memories about you that are typically not exportable; switching
      to a different agent means starting over. Letta is the leading
      open answer: an agent backed by a memory store you control,
      with the memory itself in your database. Compared to siblings:
      mem0 (similar mission, different memory-tier design), Zep (also
      open, focused on developer agents), the memory features baked
      into closed agents (the same idea but server-side and locked to
      the vendor).

      Production-readiness: beta. The framework works and ships;
      production deployments at scale are emerging. Used by developers
      building stateful chatbots, personal-AI assistants, and
      research agents. Strategic significance: if open agents are
      going to displace closed ones, the memory layer is one of the
      hardest gaps to close, and Letta is the best current open bet
      on closing it.
    sources:
      - title: "Letta"
        url: "https://letta.com/"
      - title: "Letta on GitHub"
        url: "https://github.com/letta-ai/letta"
      - title: "MemGPT Paper (Towards LLMs as Operating Systems)"
        url: "https://arxiv.org/abs/2310.08560"

