# Projects catalog per layer.
#
# 5-10 representative projects per layer. Each has: slug, name, layers
# (primary first; cross-layer projects list multiple), license, focus
# (open / open-weights / source-available / proprietary), maturity, url,
# github (optional), description (one line).
#
# License values: "Apache 2.0" | "MIT" | "BSD-3" | "BSD-2" | "MPL 2.0" |
# "AGPL-3.0" | "PostgreSQL" | "Llama Community License" | "Gemma Terms" |
# "Source-available" | "Proprietary" | "ImpACT" | "Standard"
#
# Focus tags: "open" (OSI-approved) | "open-weights" (source-available
# weights) | "source-available" (visible source, non-OSI license) |
# "proprietary" (closed) | "standard" (specification, not software)
#
# Maturity: "stable" | "beta" | "alpha" | "research" | "maintenance" | "new"
#
# Edit freely as the ecosystem evolves. The weekly grants-watch and daily
# news routines do not modify this file.

projects:
  # Silicon
  - slug: nvidia-h100
    name: NVIDIA H100 / H200
    layers: [silicon]
    license: Proprietary
    focus: proprietary
    maturity: stable
    url: "https://www.nvidia.com/en-us/data-center/h100/"
    description: "Hyperscaler-class AI accelerator with CUDA software moat; default frontier-training and frontier-inference hardware."

  - slug: amd-mi300x
    name: AMD MI300X / MI325X
    layers: [silicon]
    license: Proprietary
    focus: proprietary
    maturity: stable
    url: "https://www.amd.com/en/products/accelerators/instinct/mi300/mi300x.html"
    description: "Highest-memory accelerator on the market (192 GB+ HBM); ROCm software stack open-source-adjacent."

  - slug: tenstorrent
    name: Tenstorrent (Wormhole, Blackhole)
    layers: [silicon]
    license: Apache 2.0
    focus: open
    maturity: beta
    url: "https://tenstorrent.com/"
    github: "https://github.com/tenstorrent/tt-metal"
    description: "Open-trending AI accelerators on RISC-V; Jim Keller-led; tt-metal and tt-forge open."
    explainer: |
      Tenstorrent designs AI accelerators that combine RISC-V CPU
      cores with their Tensix tensor compute units. The current
      product line is Wormhole (shipping) and Blackhole (recently
      launched). Led by CEO Jim Keller, a well-known chip architect
      whose prior work included AMD's Zen and Apple's A4 / A5.

      Tenstorrent is the rare datapoint in 2026 trying to make both
      the ISA and the accelerator open at the AI-accelerator level.
      The tt-metal low-level kernel framework and tt-forge model
      compiler are open-sourced under Apache 2.0. Compare to NVIDIA's
      H100 line, where the ISA, the accelerator, and the entire CUDA
      software stack are proprietary; or AMD's MI300X, where the
      hardware is proprietary but ROCm is mostly open. Tenstorrent
      sits further along the open spectrum than either.

      Production-readiness: shipping for real workloads, but the
      software ecosystem is years behind CUDA. Customers willing to
      do their own kernel work (national labs, sovereign-compute
      programs, research groups) can use it; mainstream production
      AI inference is still on NVIDIA. The strategic question for
      Tenstorrent is whether the open-ISA + open-accelerator argument
      attracts enough early customers and contributors to close the
      software gap before NVIDIA's lock-in compounds further.
    sources:
      - title: "Tenstorrent — Products"
        url: "https://tenstorrent.com/hardware/"
      - title: "tt-metal on GitHub"
        url: "https://github.com/tenstorrent/tt-metal"
      - title: "tt-forge on GitHub"
        url: "https://github.com/tenstorrent/tt-forge"
      - title: "Tenstorrent — Vision"
        url: "https://tenstorrent.com/vision"

  - slug: risc-v
    name: RISC-V
    layers: [silicon]
    license: Standard
    focus: open
    maturity: stable
    url: "https://riscv.org/"
    description: "Open instruction set architecture; royalty-free; substrate for open silicon (CPUs and emerging AI accelerators)."
    explainer: |
      RISC-V is an open Instruction Set Architecture governed by a
      Swiss non-profit, RISC-V International. Royalty-free, no
      licensing fees, no single-vendor control. Anyone can build a
      RISC-V chip without permission. This is the foundational layer
      that makes "open silicon" possible at all; the other two major
      ISAs (x86 and ARM) are proprietary and tied to specific licensors.

      For the open-source AI conversation, RISC-V matters because the
      AI hardware stack is dominated by NVIDIA's proprietary GPU ISA
      on top of NVIDIA-controlled hardware. Even if the weights and
      runtime above are open, the silicon underneath remains a
      chokepoint. RISC-V is the only credible path to an open
      accelerator stack that does not depend on one company's
      goodwill. The lead bet at the AI-accelerator level is Tenstorrent,
      whose Wormhole and Blackhole accelerators combine RISC-V CPU
      cores with their Tensix tensor units.

      Production-ready as an ISA, yes; it ships in embedded and
      microcontroller chips at very high volume already. As a
      substrate for AI training or inference at frontier scale, not
      yet; the software ecosystem (compilers, optimized kernels, AI
      frameworks targeting it) lags NVIDIA's CUDA stack by years.
      SiFive is the leading commercial RISC-V CPU IP vendor; Tenstorrent
      is the leading RISC-V-anchored AI accelerator bet. Status:
      foundational, real, and slow to mature into the AI-frontier role
      its open-stack advocates want for it.
    sources:
      - title: "RISC-V International — About"
        url: "https://riscv.org/about/"
      - title: "RISC-V Specifications"
        url: "https://riscv.org/specifications/"
      - title: "SiFive — RISC-V CPU IP"
        url: "https://www.sifive.com/"
      - title: "Tenstorrent — Vision (RISC-V positioning)"
