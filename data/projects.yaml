  - slug: the-pile
    name: The Pile
    layers: [data]
    license: MIT
    focus: open
    maturity: maintenance
    url: "https://pile.eleuther.ai/"
    description: "EleutherAI's 2020 825GB open corpus; influential predecessor to all current open-corpus work."

  - slug: common-pile-v0
    name: Common Pile v0.1
    layers: [data]
    license: License-clean
    focus: open
    maturity: new
    url: "https://blog.eleuther.ai/common-pile-v0/"
    description: "EleutherAI's June 2025 license-clean pretraining corpus; one of few entries doing this work at scale."
    explainer: |
      Common Pile v0.1 is an 8TB pretraining corpus assembled by
      EleutherAI in collaboration with around 30 partner
      organizations, released June 2025. The distinguishing feature
      is license-cleanness: every text source in the corpus is either
      explicitly under a permissive license (Creative Commons, public
      domain) or has documented permission for redistribution and
      retraining. EleutherAI also trained two reference models from
      it (Comma 7B variants) to demonstrate the corpus is usable.

      Common Pile matters because the open-source AI conversation
      hinges on whether you can train a competitive model without
      relying on web-scraped content of ambiguous license status.
      Compared to FineWeb (15T tokens, but not license-clean) and
      The Pile (the original 800GB EleutherAI corpus, 2021), Common
      Pile is smaller but comes with a credible license claim. This
      directly addresses the OSAID v1.0 contested clause: under the
      strictest reading of "open source AI," only models trained on
      license-clean data can qualify.

      Production-readiness: shipping and used by the reference Comma
      7B models, but no frontier-class model has trained on Common
      Pile at scale yet (as of this entry's update). The honest
      ceiling: 8TB is a reasonable substrate for 7-30B-scale models,
      but pushing to 70B+ would require either a much larger v1.0 or
      mixing with non-license-clean sources. Common Pile is the
      existence proof; whether it scales to frontier remains the
      open question.
    sources:
      - title: "Common Pile v0.1 Announcement (EleutherAI)"
        url: "https://blog.eleuther.ai/common-pile-v0/"
      - title: "Common Pile on HuggingFace"
        url: "https://huggingface.co/blog/stas/common-pile-v01"
      - title: "OSAID v1.0 (data clause)"
        url: "https://opensource.org/ai/open-source-ai-definition"

  # Training
  - slug: unsloth
    name: Unsloth
    layers: [training]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://unsloth.ai/"
    github: "https://github.com/unslothai/unsloth"
    description: "2-30x faster fine-tuning with 70% less VRAM; consumer-GPU-friendly LoRA / QLoRA; free open-source tier."
    explainer: |
      Unsloth is an open-source fine-tuning framework built by Daniel
      and Michael Han. The headline claim is dramatically faster fine-
      tuning (2-30x depending on the configuration) with substantially
      less GPU memory (~70% reduction vs the HuggingFace TRL baseline),
      achieved via custom Triton kernels and careful memory management.
      The free tier is Apache 2.0 and complete; paid Pro and Enterprise
      tiers add multi-GPU and managed-platform features.

      Unsloth matters because it is the most practical entry point for
      individuals and small teams to fine-tune frontier-class
      open-weights models on hardware they can afford. Pre-Unsloth,
      fine-tuning Llama 3 8B realistically required an A100; with
      Unsloth, a 4090 or even a Mac (via MPS) is enough. Compared to
      siblings: HuggingFace TRL (the canonical reference; Unsloth is a
      drop-in replacement that's much faster), Axolotl (more
      configuration-driven, supports more methods), LLaMA-Factory
      (Chinese-open-source equivalent, very feature-rich).

      Production-ready and widely used. The free notebooks ship as
      ready-to-run Colab and Kaggle notebooks; thousands of
      fine-tuned models on HuggingFace cite Unsloth in their model
      cards. The strategic question: how much of the fine-tuning
      ecosystem migrates to Unsloth as the default vs stays on TRL
      for compatibility with the rest of the HuggingFace stack.
    sources:
      - title: "Unsloth Documentation"
        url: "https://docs.unsloth.ai/"
      - title: "Unsloth on GitHub"
        url: "https://github.com/unslothai/unsloth"
