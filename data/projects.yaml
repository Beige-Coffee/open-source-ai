  # Runtime
  - slug: vllm
    name: vLLM
    layers: [runtime]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://docs.vllm.ai/"
    github: "https://github.com/vllm-project/vllm"
    description: "Dominant open production inference engine; PagedAttention and continuous batching; NVIDIA / AMD / Intel / TPU support."
    explainer: |
      vLLM is an open inference engine for large language models,
      originally built at UC Berkeley by Woosuk Kwon and collaborators.
      Apache 2.0. Now stewarded by an independent vLLM project team
      and hosted under the LF AI and Data foundation. The central
      technical contribution is PagedAttention, an attention-cache
      memory manager that treats GPU KV-cache as virtual memory pages,
      allowing high utilization under varied-length requests.

      vLLM matters because runtime is the layer that decides how
      cheaply weights become tokens. The same Llama 3 70B model can
      cost an order of magnitude more on a poorly-tuned runtime than
      a well-tuned one. vLLM has repeatedly demonstrated parity with
      or improvement over NVIDIA's closed TensorRT-LLM, and it works
      on AMD ROCm, Intel Gaudi, and increasingly TPU. The closed
      counterpart, TensorRT-LLM, is NVIDIA-only. Within the open set,
      SGLang is the leading alternative (different attention scheme,
      strong on structured generation); llama.cpp is the local-first
      sibling (CPU and Apple Silicon, not server-grade GPU).

      Production-ready and widely deployed. It is the default open
      production inference engine in 2026: shipped behind multiple
      hosted LLM services, used by self-hosters running 7B-70B
      models on commodity GPUs, and the reference engine that other
      open work compares itself against. The v1 architectural refresh
      landed in early 2025 and reset the performance baseline.
    sources:
      - title: "vLLM Documentation"
        url: "https://docs.vllm.ai/"
      - title: "Efficient Memory Management for LLM Serving with PagedAttention (Kwon et al., 2023)"
        url: "https://arxiv.org/abs/2309.06180"
      - title: "vLLM v1 Architecture Announcement"
        url: "https://blog.vllm.ai/"
      - title: "vLLM on GitHub"
        url: "https://github.com/vllm-project/vllm"

  - slug: sglang
    name: SGLang
    layers: [runtime]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://sglang.ai/"
    github: "https://github.com/sgl-project/sglang"
    description: "RadixAttention plus structured generation; from the LMSYS team; gains for shared-prefix and agent workloads."
    explainer: |
      SGLang is an open inference engine for large language models
      from the LMSYS team (the same group behind Chatbot Arena).
      Apache 2.0. The central technical contribution is RadixAttention,
      a KV-cache sharing scheme that reuses computation across
      requests with shared prefixes (system prompts, few-shot examples,
      multi-turn agent conversations) by storing the cache in a
      radix-tree structure. SGLang also has strong primitives for
      structured generation (constraining output to a JSON schema, a
      grammar, or a regex).

      SGLang matters as the leading vLLM alternative on the open
      runtime side. Compared to vLLM (PagedAttention, broader hardware
      support, larger ecosystem), SGLang's distinctive wins are
      scenarios with heavy prompt-prefix sharing (agent loops, multi-
      turn chat with long system prompts) and structured-output
      requirements. llama.cpp is the local-first sibling for hardware
      you own; SGLang and vLLM target server-class GPUs. TensorRT-LLM
      is the closed NVIDIA-only counterpart.

      Production-ready. Used by xAI for Grok, by hosted-inference
      providers for shared-prefix workloads, and increasingly by
      teams running agent fleets where prefix caching pays off. The
      strategic position is not "displace vLLM" but "be the right
      engine for workloads where RadixAttention matters." Both vLLM
      and SGLang continue to converge on each other's strengths.
    sources:
      - title: "SGLang Project"
        url: "https://sglang.ai/"
      - title: "SGLang on GitHub"
        url: "https://github.com/sgl-project/sglang"
      - title: "SGLang Paper (Efficient Execution of Structured LM Programs)"
        url: "https://arxiv.org/abs/2312.07104"

  - slug: llama-cpp
    name: llama.cpp
    layers: [runtime]
    license: MIT
    focus: open
    maturity: stable
    url: "https://github.com/ggml-org/llama.cpp"
    github: "https://github.com/ggml-org/llama.cpp"
    description: "Georgi Gerganov's local-first inference engine; defines the GGUF format; the on-device standard."
    explainer: |
      llama.cpp is Georgi Gerganov's open inference engine for large
      language models. Pure C/C++ with no required runtime
      dependencies, MIT-licensed. The project also defines the GGUF
      file format, which has become the de facto standard for
      distributing quantized open-weights models. Backend support
      includes CPU SIMD, NVIDIA CUDA, AMD ROCm, Apple Metal, Vulkan,
      and more, with the Apple Silicon backend particularly well-
      tuned.

      llama.cpp matters because it is the only major inference engine
      designed first for hardware you actually own. Where vLLM and
      SGLang target server-class NVIDIA GPUs, llama.cpp targets
      laptops, desktops, Macs, Raspberry Pis, and small-VRAM consumer
      cards. Combined with Apple Silicon's unified-memory bandwidth,
      llama.cpp is the substrate that makes "a 70B model running on
      your Mac at usable speed" possible. Compared to siblings:
      Ollama is the polished UX layer wrapping llama.cpp, MLC-LLM is
      a cross-platform compilation play, MLX is Apple's first-party
      ML framework. llama.cpp is the engine the others build on or
      compete with directly.

      Production-ready and the on-device standard. Used by Ollama,
      LM Studio, Jan, Faraday, and many other consumer AI apps that
      run inference on the user's machine. Maintained by an
      energetic community led by Gerganov; the project's pace is
      among the fastest in open AI infrastructure. The quiet
      strategic significance: llama.cpp is the layer that makes the
      sovereignty-anchored "buy your own hardware, run your own
      models" thesis operational today.
    sources:
      - title: "llama.cpp on GitHub"
        url: "https://github.com/ggml-org/llama.cpp"
      - title: "GGUF Format Specification"
        url: "https://github.com/ggml-org/ggml/blob/master/docs/gguf.md"
      - title: "ggml (the underlying tensor library)"
        url: "https://github.com/ggml-org/ggml"

  - slug: ollama
    name: Ollama
    layers: [runtime]
    license: MIT
    focus: open
    maturity: stable
    url: "https://ollama.com/"
    github: "https://github.com/ollama/ollama"
    description: "Local model runner; Docker-style UX over llama.cpp; the easiest way to run open weights on your machine."
    explainer: |
      Ollama is a local model runner that wraps llama.cpp with a
      Docker-style command-line and HTTP API. Install Ollama, run
      `ollama pull llama3.3` and `ollama run llama3.3`, and you have
      a local model serving over a localhost API endpoint. MIT-
      licensed. Ships native installers for macOS, Linux, and
      Windows.

      Ollama matters because it makes local inference accessible to
      developers who do not want to learn the llama.cpp build flags
      and quantization settings. The model library handles GGUF
      downloads from a curated registry; the API speaks an
      OpenAI-compatible shape (with extensions) so existing client
      code works against Ollama with a baseURL change. Compared to
      siblings: llama.cpp is the engine underneath (more flexibility,
      more setup), LM Studio is a GUI alternative, MLX is Apple's
      direct API for Apple Silicon. Ollama is the most-deployed local
      runner among developers who want minimal friction.

      Production-ready for development and personal use. Used as the
      backend for many local-AI applications, IDE plugins, and
      personal-AI projects (HRF-funded Orchard pairs Ollama with
      Lightning and Cashu). The strategic position: Ollama is the
      "easy button" for local AI; for production-scale serving you
      generally move to vLLM or SGLang. The growing question is
      whether Ollama's commercialization plans (paid tiers, hosted
      services) preserve the open-source character that made it
      useful in the first place.
    sources:
      - title: "Ollama"
        url: "https://ollama.com/"
      - title: "Ollama on GitHub"
        url: "https://github.com/ollama/ollama"
      - title: "Ollama API Documentation"
        url: "https://github.com/ollama/ollama/blob/main/docs/api.md"

