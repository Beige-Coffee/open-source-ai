    maturity: new
    url: "https://aaif.linuxfoundation.org/"
    description: "Linux Foundation umbrella for agent and protocol governance; founded Dec 2025; hosts MCP, goose, AGENTS.md."

  - slug: l402
    name: L402
    layers: [protocols]
    license: Apache 2.0
    focus: open
    maturity: stable
    url: "https://docs.lightning.engineering/lightning-network-tools/lnd/l402"
    github: "https://github.com/lightninglabs/L402"
    description: "Lightning Labs payment protocol pairing HTTP 402 with Lightning Network invoices; the original agentic-payments rail."
    explainer: |
      L402 is a payment protocol that combines the long-dormant HTTP
      402 "Payment Required" status code with Lightning Network
      invoices and a macaroon-based capability token. A client requests
      a resource; the server replies 402 with a Lightning invoice; the
      client pays the invoice and gets back a token that authorizes
      subsequent requests. The whole exchange is permissionless, no
      account or API key required.

      L402 matters for the open-source AI conversation because AI
      agents are becoming economic actors (paying for tool calls,
      inference, data) and the rails they pay on determine who can
      become an economic agent without permission. The sibling
      protocols are x402 (Coinbase's 2025 stablecoin-anchored revival
      of HTTP 402, on-chain settlement instead of Lightning) and
      various early MCP commerce extensions that propose paying for
      MCP tool calls directly. The closed counterpart is Stripe Agent
      SDK, which works fine but binds the agent to a Stripe account.

      Production-ready spec since 2020. Used by Lightning Labs' own
      Loop / Pool / Aperture services, by HRF-funded projects like
      Routstr (an LLM routing marketplace on Nostr that uses L402 for
      payment) and PayPerQ (a chatbot gateway that accepts Lightning),
      and by an emerging set of agent-payment startups. The honest
      limit: adoption is still concentrated in the Bitcoin-Lightning
      ecosystem; broader AI-agent adoption depends on whether the
      ecosystem treats Lightning as a viable rail or moves to on-chain
      stablecoin alternatives.
    sources:
      - title: "L402 Documentation (Lightning Labs)"
        url: "https://docs.lightning.engineering/lightning-network-tools/lnd/l402"
      - title: "L402 on GitHub"
        url: "https://github.com/lightninglabs/L402"
      - title: "HRF AI for Individual Rights — Routstr"
        url: "https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/"
      - title: "HTTP 402 (W3C)"
        url: "https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/402"

  - slug: x402
    name: x402
    layers: [protocols]
    license: Apache 2.0
    focus: open
    maturity: beta
    url: "https://www.x402.org/"
    github: "https://github.com/coinbase/x402"
    description: "Coinbase's HTTP 402 revival with on-chain settlement; under the Linux Foundation; Stripe shipped an x402 integration in 2026."
    explainer: |
      x402 is Coinbase's revival of the long-dormant HTTP 402 "Payment
      Required" status code. Open spec under Apache 2.0. The
      mechanism: a client requests a resource; the server replies 402
      with payment instructions referencing an on-chain stablecoin
      payment (USDC primarily); the client pays; the server returns
      the resource on confirmation. Released in 2025 and donated to
      the Linux Foundation.

      x402 matters because it is the on-chain-settlement counterpart
      to L402's Lightning-anchored approach to the same problem
      (paying for agent-accessed resources without an account). The
      design choice is the interesting tradeoff: Lightning offers
      sub-second settlement and very low fees but locks you to the
      Bitcoin ecosystem; on-chain stablecoin settlement is more
      familiar to web2 builders and integrates with existing payment
      infrastructure but settles slower and has higher per-tx fees.
      Compared to L402 (Lightning, Bitcoin-anchored, longer track
      record), x402 (stablecoin, web2-friendlier, newer), and Stripe
      Agent SDK (closed, very polished, ties you to Stripe).

      Production-readiness: shipping and adopted by a growing set of
      AI infrastructure providers. Stripe announced an x402
      integration in 2026, which is a strong signal of acceptance at
      the payments-incumbent layer. The strategic question for x402
      and L402 jointly: which agentic-payment rail wins matters more
      than people realize, because the rails determine who can become
      an economic agent in the agentic web without permission.
    sources:
      - title: "x402.org"
        url: "https://www.x402.org/"
      - title: "x402 on GitHub (Coinbase)"
        url: "https://github.com/coinbase/x402"
      - title: "Linux Foundation x402 Announcement"
        url: "https://www.linuxfoundation.org/press/coinbase-contributes-x402-payment-standard-to-the-linux-foundation"

