# Predictions baseline (2026-Q3 vintage).
#
# For each layer, a small set of falsifiable predictions on a defined
# horizon (typically end-2026 or mid-2027). Each prediction lists:
#   - claim: what we expect to happen
#   - horizon: deadline by which the prediction resolves
#   - confidence: 1-5 (1 = vibes, 5 = market priced)
#   - resolves_when: concrete observable that resolves it
#   - filed: when it was filed (cohort tracking)
#
# Editorial bias: predictions should be specific enough that a third
# party can resolve them without our help. Avoid mood predictions
# ("the open ecosystem will gain ground"). Prefer numbers, brand
# names, and dated thresholds.
#
# This file is the baseline cohort. New predictions get added each
# quarter and old ones get resolved in the news log.

predictions:
