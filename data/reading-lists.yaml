    description: Read the original EO, then read the 2025 rescission. The arc tells you where US AI policy is.
  - title: Choose an Open Source License
    source: GitHub
    url: https://choosealicense.com/
    type: docs
    year: 2025
    layers:
      - governance
    description: The first stop before publishing anything. Pragmatic license comparison without lawyerese.
  - title: The Foundation Model Transparency Index
    source: Stanford HAI
    url: https://crfm.stanford.edu/fmti/
    type: docs
    year: 2024
    layers:
      - governance
    description: Multi-dimensional scoring of transparency across major foundation models. Most-useful published artifact for this conversation.
    sources:
      - title: crfm.stanford.edu (audit-verified)
        url: https://crfm.stanford.edu/fmti/
  - title: 'Verifiable Compute: A Primer'
    source: EZKL team
    url: https://blog.ezkl.xyz/
    type: post
    year: 2025
    layers:
      - identity-trust
    description: ZK-proven inference, in plain English. Start here, not at the cryptography papers.
  - title: 'Apple''s Private Cloud Compute: A New Frontier for AI Privacy in the Cloud'
    source: Apple Security Engineering
    url: https://security.apple.com/blog/private-cloud-compute/
    type: post
    year: 2024
    layers:
      - identity-trust
    description: The most-technically-detailed public account of a production confidential-AI deployment. Required reading.
  - title: Decentralized Identifiers (DIDs) v1.0
