# Hardware catalog. One row per SKU (the way data/models.yaml is one row
# per checkpoint). Drives /hardware: the spec table, the per-SKU detail
# pages, and the interactive fit/tokens-per-sec explorer.
#
# Discipline (see docs/HARDWARE.md):
#   - Every numeric spec is per single accelerator/unit; multi-unit
#     composition is a calculator concern, not a data concern.
#   - Compute TFLOPS are DENSE, never sparse. Where only a sparse or
#     derived figure exists, the field is omitted rather than asserting
#     an unsourced number.
#   - memory_bandwidth_gbs is the most important field for decode and is
#     non-negotiable on sourcing.
#   - Every entry carries `url` + `sources`; values flow through the
#     claims-ledger verification gate before they render.
#   - No cloud, no pricing (decision D3).

hardware:
