# News sources for the daily routine.
#
# Per-layer ranked source list. RSS / Atom feeds are first-class; HTML
# scrapes are tagged `scrape: true`. The daily routine fetches every
# `feed` URL via WebFetch, parses entries, dedupes against last-run.json,
# routes by `layer`, and publishes.
#
# Editing this file: add or remove sources here. The agent reads this on
# every run; no code change required.
#
# Anti-pattern blocklist lives in data/news-rules.yaml.

aggregators:
  - id: ai-news-smol
    name: "AI News (by smol AI)"
    feed: "https://news.smol.ai/rss.xml"
    type: rss
    layer: any
    signal: very-high
    notes: "Already-aggregated daily summary of 356 X accounts + 21 Discords. Spine of the routine. Use entries to cross-validate other sources."

  - id: tldr-ai
    name: "TLDR AI"
    feed: "https://tldr.tech/api/rss/ai"
    type: rss
    layer: any
    signal: medium
    notes: "Daily 5-minute roundup. Mainstream-skew; use to catch the broader news cycle."

