    region: Global
    url: https://hrf.org/latest/announcing-the-ai-hack-for-freedom-hackathon-winners/
    description: >-
      Application running on the decentralized Nostr protocol so it cannot be shut down by governments. Built at HRF's
      first AI Hack for Freedom in Austin, January 2026.
    explainer: >-
      Pathos won a prize at the Human Rights Foundation's first AI Hack for Freedom hackathon in Austin, January 17 to
      18, 2026, with winners announced on January 21. The application is built on the decentralized Nostr protocol so
      that no single hosting provider, domain registrar, or app-store gatekeeper can shut it down at government request.


      The product targets activists in countries where governments block communication channels and freeze access to
      financial rails. The app combines a country-specific Nostr feed where activists can post and reshare on-the-ground
      events, a map of users worldwide, a self-custodial Bitcoin wallet built on the Breeze SDK that supports instant
      private micro-donations, integration with Bitchat for offline messaging during internet shutdowns, and an AI
      assistant powered by Maple AI for organizing-strategy questions. The donation rails are what the rest depends on:
      in pilot use in Venezuela, contributors earned bitcoin for sharing verified images of political prisoners,
      demonstrating the bounty-style mechanism the app encodes. A beta build is available on the Google Play store for
      Android and at pathos.place.


      The team was captained by Leopoldo Lopez, the Venezuelan opposition figure who founded the Voluntad Popular party
      in 2009, was imprisoned from 2014 to 2020 for leading civil-resistance protests, escaped house arrest in 2020 and
      now lives in exile in Spain, and co-founded the World Liberty Congress in 2022 as a counter-alliance of democracy
      defenders from authoritarian states. The application combines that organizing context with the freedom-tech
      substrate HRF has been funding across the rest of the round (Nostr for distribution, Bitcoin for payment, Maple
      for inference), making Pathos a relatively complete reference implementation of the cypherpunk activist stack
      rather than a single feature.
