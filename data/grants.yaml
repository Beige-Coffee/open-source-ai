    explainer: >-
      OpenEuroLLM is a multi-partner European consortium building an open multilingual large language model under
      Horizon Europe funding, with an allocation of roughly €55M (about $60M). The launch press release lists 20
      European research institutions, companies, and EuroHPC supercomputing centres as members, positioning the project
      as the EU's coordinated answer to US and Chinese frontier model labs.


      The consortium sits inside a broader €307M EU AI investment package and is one of the largest publicly funded
      open-model efforts globally. Output is intended to cover all official EU languages, which is a deliberate contrast
      to US frontier models whose multilingual coverage is uneven outside of English.
    sources:
