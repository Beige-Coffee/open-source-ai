  - title: NGI Zero Commons Fund April 2026 round
    kind: program
    funder: nlnet
    recipient: 57 projects
    date: 2026-04
    amount_usd: 1500000
    amount_label: €1.4M (~$1.5M) across 57 projects
    layers:
      - protocols
      - identity-trust
      - governance
    region: EU
    url: https://nlnet.nl/news/2026/20260409-announce-commons-fund.html
    description: Bi-monthly Commons Fund call. Recent rounds skew protocols / open data / trusted open hardware.
    explainer: >-
      NLnet Foundation announced the April 2026 NGI Zero Commons Fund round on April 9, 2026, selecting 57 free and open
      source projects with a total round value of approximately €1.4M (~$1.5M). The Commons Fund is one strand of
      NLnet's NGI Zero program, which operates on a bi-monthly call cadence with grants typically in the €5K to €50K
      range per project.


      The ninth call's portfolio skews toward protocols and interoperability (messaging standards, federated
      communication, remote desktop), trustworthy open hardware (PCB design tools, security modules, embedded systems),
      and end-user community applications. The program is funded by the European Commission's Next Generation Internet
      programme via DG CNECT (grant agreement No. 101135429) and by the Swiss State Secretariat for Education, Research
      and Innovation.


      NLnet's overall NGI Zero commitment for 2024 through 2027 is €21.6M across all open calls. The next deadline is
      June 1, 2026. For a sovereignty-minded reader, NGI Zero is one of the few EU-scale public funders running a
      sustained, small-grants pipeline across protocol-layer, hardware, and digital-commons work.
    sources:
      - title: NLnet NGI Zero Commons Fund April 2026 announcement
        url: https://nlnet.nl/news/2026/20260409-announce-commons-fund.html
