    region: Global
    url: https://www.mozillafoundation.org/en/what-we-do/grantmaking/incubator/democracy-ai-cohort/
    description: 10 teams at $50K each plus a $250K Sustain Track top-up. Focus on civic AI infrastructure.
    explainer: >-
      Mozilla's Democracy x AI Cohort 2026 funds 10 teams at $50K each for 12 months, with the initial project proposal
      window opening February 12, 2026. A separate Sustain Track provides additional funding of $250,000 per project for
      cohort members continuing past the initial phase.


      The total initial-cohort commitment is $500K, with the Sustain Track top-up structure pushing the program well
      past $1M when fully drawn. Focus areas center on civic AI infrastructure, including governance tooling, agentic
      systems for public-interest work, and decentralization-relevant primitives.


      Among 2026 cohort-style programs, Democracy x AI is one of the few with explicit governance and civic framing
      rather than a generic open-source or safety frame, which makes it a useful reference for funders thinking about
      AI's intersection with democratic institutions.
    sources:
