        url: https://arxiv.org/abs/2501.10114
      - title: MINT Lab
        url: https://mintresearch.org/
  - title: Institute for Decentralized AI launch
    kind: project
    funder: cosmos-institute
    recipient: Samuele Marro (Cosmos Incubation Fellow)
    date: "2025-09"
    amount_label: 5 fully funded research positions
    layers:
      - sovereignty-decentralization
      - protocols
      - governance
    region: UK
    url: https://blog.cosmos-institute.org/p/new-decentralized-ai-project-and
    description: >-
      New institute combining research and infrastructure to support AI that operates without centralized gatekeepers.
      Initial cohort of five fully funded positions across Oxford and Stanford.
    explainer: >-
      Cosmos Institute announced the Institute for Decentralized AI (IDAI) on September 15, 2025, with Samuele Marro as
      the Cosmos Incubation Fellow leading the launch. Marro is a DPhil student at Oxford's AIMS Centre for Doctoral
      Training, working on agent communication and collaboration with funding from Microsoft. He chairs the Lightweight
      Agent Standards Working Group.


      The institute's research agenda has four named areas: trustworthy AI agents covering identity, authentication,
      monitoring, and accountability; anomaly detection in multi-agent language model networks with theoretical and
      statistical foundations; formalizing safety in agent networks via threat models and statistical relaxations; and
      trust and oversight protocols including reputation and mutual auditing. The technical position is that
      heterogeneous, distributed agent networks are the path to a more decentralized AI surface, and that the missing
      piece is the cross-agent protocol and oversight layer rather than the models themselves.


      Marro's prior research includes Agora, a meta-protocol for inter-agent communication described in the arXiv paper
      "A Scalable Communication Protocol for Networks of Large Language Models" (2410.11905). Agora frames cross-agent
      communication as a trilemma between versatility, efficiency, and portability, and uses a mixture of structured
      routines, natural language fallback, and LLM-written routines to navigate it. This work sits in the same
      protocol-layer category as Anthropic's MCP and Google's A2A but explicitly targets heterogeneous, decentralized
      networks rather than a single hub-and-spoke runtime.


      The institute's initial cohort consists of five fully funded research positions distributed between Oxford and
      Stanford. It sits at the protocols, sovereignty-decentralization, and governance cross-layers: it is
      upstream of any individual agent product, and the lock-in vector it is trying to push back on is the
      platform-agent monopoly Lazar describes in the same Cosmos cohort.
    sources:
      - title: New decentralized AI project and Institute launch
        url: https://blog.cosmos-institute.org/p/new-decentralized-ai-project-and
      - title: Institute for Decentralized AI
        url: https://decentralized-ai.org/
      - title: A Scalable Communication Protocol for Networks of Large Language Models (Marro et al., 2024)
        url: https://arxiv.org/abs/2410.11905
  - title: Goose grant program launch
    kind: program
    funder: block-goose
    recipient: Multiple external builders
    date: "2025-06-01"
    amount_label: Up to $100K per grant
    layers:
      - agents
      - runtime
      - protocols
    region: Global
    url: https://block.xyz/inside/introducing-the-goose-grant-program
    description: >-
      Launch of grants for external developers building integrations, tooling, and infrastructure on Block's open-source
      goose agent platform. Goose runs locally, supports any model, and has shipped to thousands of developers via
      partners like Databricks.
    explainer: >-
      Goose is Block's open-source AI agent, released January 2025 under Apache 2.0 and accumulating tens of thousands
      of GitHub stars by mid-2026. The codebase is primarily Rust with a TypeScript desktop frontend. Goose ships as a
      native desktop app for macOS, Linux, and Windows, a CLI for terminal workflows, and an embeddable API. Governance
      moved to the Agentic AI Foundation (AAIF) at the Linux Foundation, with the canonical repo at
      github.com/block/goose.


      The platform is model-agnostic: it integrates with 15 or more providers including Anthropic, OpenAI, Google,
      Ollama, OpenRouter, Azure, and Bedrock. When paired with Ollama or another local runtime, the entire agent loop,
      including model inference, can stay on the user's machine with no prompts or outputs leaving the host. Tool
      integration is built on the Model Context Protocol (MCP), the open standard developed with Anthropic, and goose
      connects to more than 70 MCP extensions covering databases, code hosts, browsers, Snowflake, Databricks, Slack,
      and Google Drive.


      The grant program launched June 2025 caps individual awards at $100K and is administered through Block's Open
      Source Program Office on a rolling basis. According to Block's announcement, the platform has reached thousands of
      community members and dozens of external code contributors, with adoption supported by partners including
      Databricks. Grants target external builders extending the platform, not internal development on goose itself.


      The program sits at the agents, runtime, and protocols layers. The lock-in vector it pushes back on is the
      closed-agent stack where the model vendor also controls the tool runtime and the desktop client. Sibling efforts
      at the same layer include OpenInterpreter, AutoGen, and Smol agents, but goose is one of the few in the category
      backed by a public company under a permissive license and with a Linux Foundation governance structure.
    sources:
      - title: Introducing the goose grant program
        url: https://block.xyz/inside/introducing-the-goose-grant-program
      - title: goose on GitHub
        url: https://github.com/block/goose
      - title: Meet Goose, an Open Source AI Agent (Databricks Data + AI Summit 2025)
        url: https://www.databricks.com/dataaisummit/session/meet-goose-open-source-ai-agent
  - title: Orchard
    kind: project
    funder: opensats
    recipient: Orchard developers
    date: "2025-06-01"
    amount_label: Undisclosed
    layers:
      - runtime
      - sovereignty-decentralization
      - protocols
    region: Global
    url: https://opensats.org/blog/2025-year-in-review
    description: >-
      Web application integrating an Ollama-powered local AI interface alongside Lightning Network Daemon, Taproot
      Assets, and Cashu. Demonstrates how local LLMs can be paired with sovereign-money rails.
    explainer: >-
      Orchard is a web application that unifies the components needed to operate a Cashu mint behind a single interface.
      Mint operators have historically run Bitcoin, Lightning, and ecash infrastructure through a fragmented mix of
      command-line tools, SQL queries, and separate dashboards. Orchard integrates Lightning Network Daemon (LND),
      Taproot Assets daemon (tapd), Cashu implementations including CDK and Nutshell, and an AI interface backed by
      Ollama as togglable modules in one operator-facing application. Its modular architecture lets operators start with
      a minimal subset and add services as they scale.


      The AI component is Ollama-based and runs locally rather than calling a hosted model API. This keeps the
      language-model surface on the same machine as the mint's keys and Lightning channels, avoiding the operational and
      trust problem of routing mint commands through a third-party inference provider. The combination is unusual in the
      open AI stack: most local-LLM products sit on top of consumer hardware for personal use, while Orchard binds local
      inference to sovereign-money rails at the operator layer of a Bitcoin-adjacent protocol.


      OpenSats funded Orchard in 2025, named in the foundation's year-in-review post dated June 2025. Per OpenSats, the
      funding supports adding revenue features and backups for Cashu mints, improving authentication and observability,
      hardening trust through event logs and multi-user support, extending Lightning support beyond LND to include Core
      Lightning (CLN), and building out the test suite, documentation, and revenue-model research for long-term
      sustainability.


      The grant sits at the runtime, sovereignty-decentralization, and protocols cross-layers. It fits OpenSats'
      practice of funding AI-adjacent work specifically when the project is integrated with sovereign-money protocols,
      distinguishing it from general-purpose local-AI grants such as Mozilla Builders.
    sources:
      - title: OpenSats 2025 year in review
        url: https://opensats.org/blog/2025-year-in-review
      - title: Fourteenth Wave of Bitcoin Grants (Orchard description)
        url: https://opensats.org/blog/fourteenth-wave-of-bitcoin-grants
  - title: Ente Photos
    kind: project
    funder: mozilla
    recipient: Ente
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - retrieval-memory
      - runtime
    region: Asia
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Open-source on-device semantic search and image recognition for private photo storage. Mozilla Builders
      Accelerator cohort 1 (local AI theme); avoids cloud dependency for personal photo libraries.
    explainer: >-
      Ente Photos is an end-to-end-encrypted photo storage product developed by Ente, a company building
      privacy-preserving consumer infrastructure. The codebase is fully open source under github.com/ente-io/ente and
      covers both client apps (mobile, desktop, web) and server, with self-hosting supported. The client is built
      primarily in Flutter; server-side storage uses encrypted objects keyed per file, with the user holding the master
      key.


      Because Ente cannot read user photos by design, all machine-learning workloads run on the user's device. Magic
      Search, the natural-language image search feature, uses Apple's MobileCLIP model, which is an efficiency-oriented
      iteration of OpenAI's CLIP architecture. The MobileCLIP image encoder runs locally over each photo to produce an
      embedding; at query time the text encoder runs over the user's prompt and the two embeddings are compared inside
      the same vector space. Face recognition runs YOLOv5-based face detection (the FlutterFace demo repo,
      github.com/laurenspriem/flutterface, documents the implementation Ente uses to explore on-device face recognition)
      followed by MobileFaceNet for face embeddings.


      Image embeddings and face embeddings are compressed losslessly and encrypted with the per-file key before being
      uploaded to object storage. Clustering and person-grouping happen locally; the resulting "person entities" are
      themselves encrypted before leaving the device. Once derived, the ML index is synced end-to-end encrypted across
      the user's devices, so indexing done on a high-end laptop can be reused on a phone without re-running the model
      from scratch.


      Mozilla selected Ente Photos for the first cohort of the Mozilla Builders Accelerator, announced September 23,
      2024, with awards of up to $100K plus mentorship. The grant is non-dilutive. The cohort was scoped around Local
      AI, AI that runs on the user's hardware rather than in a vendor cloud, and Mozilla Builders rules require
      participating projects to release their work under open-source licenses. The grant sits at the retrieval-memory
      and runtime layers of the open stack: it pushes back on the default that consumer photo libraries are
      vendor-readable training data.
    sources:
      - title: "14 AI projects to watch: Mozilla's first Builders Accelerator cohort"
        url: >-
          https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
      - title: Mozilla grants Ente $100k
        url: https://ente.io/blog/mozilla-builders/
      - title: Ente machine learning page
        url: https://ente.com/ml/
      - title: FlutterFace demo repo
        url: https://github.com/laurenspriem/flutterface
  - title: Transformer Lab
    kind: project
    funder: mozilla
    recipient: Transformer Lab
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - training
      - weights
      - runtime
    region: US
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Cross-platform desktop application for building, training, fine-tuning, evaluating, and exporting local LLMs on
      Windows, macOS, and Linux. Ships in Mozilla's first Builders Accelerator local-AI cohort.
    explainer: >-
      Transformer Lab is a cross-platform desktop application for the full local-LLM development loop. The application
      is open source under AGPL-3.0 at github.com/transformerlab/transformerlab-app, and is built with Python for the
      backend (around 67 percent of the codebase) and TypeScript for the desktop UI (around 28 percent). It runs as a
      native desktop app on macOS (Apple Silicon M1 through M4), Linux (NVIDIA or AMD GPUs), and Windows (NVIDIA via
      WSL2). The UI can also be detached from the engine: users can run the desktop interface locally while the actual
      training and inference engine runs on a remote GPU box or cloud machine.


      The application packages multiple parts of the stack into one tool. For model management it supports HuggingFace,
      GGUF, and MLX formats with conversion between them, and one-click downloads for Llama, Gemma, Qwen, Phi, Mistral,
      and similar families. For training it supports full fine-tuning, LoRA, QLoRA, RLHF variants including DPO, ORPO,
      and SimPO, and explicit reward modeling. Hardware-specific trainers are provided for Apple Silicon (MLX), NVIDIA
      (CUDA), and AMD (ROCm). For inference it integrates MLX, vLLM, Llama.cpp, FastChat, and HuggingFace Transformers,
      with engine switching from the UI. A drag-and-drop dataset builder pulls from HuggingFace datasets or accepts
      local files, and a RAG mode handles retrieval over user files.


      The project is credited to Ali Asaria and Tony Salomone, with Mozilla Builders backing. Mozilla selected
      Transformer Lab for the first Mozilla Builders Accelerator cohort, announced September 23, 2024, with awards of up
      to $100K plus mentorship under the cohort's local-AI theme. The most recent release as of mid-2026 is v0.38.0 (May
      13, 2026).


      The grant sits at the training, weights, and runtime layers of the open stack. The category it fits is the
      integrated local-LLM workbench, sibling to LM Studio, Oobabooga, and AnythingLLM, but distinguished by first-class
      training and fine-tuning support rather than inference-only chat. The AGPL license enforces source-availability
      for any networked redeployment, which is a stronger copyleft posture than most peers.
    sources:
      - title: "14 AI projects to watch: Mozilla's first Builders Accelerator cohort"
        url: >-
          https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
      - title: Transformer Lab on GitHub
        url: https://github.com/transformerlab/transformerlab-app
  - title: Sartify (Swahili LLM)
    kind: project
    funder: mozilla
    recipient: Sartify
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - training
      - weights
      - data
    region: Africa
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Foundation-model and tooling work for Swahili-speaking regions. Creates general and domain-specific AI
      capabilities for a language poorly served by major commercial models.
    explainer: >-
      Sartify is a Tanzania-based deep-tech AI company building Swahili-language models and tooling. The company was
      cofounded by Dr. Michael S. Mollel (CEO), a postdoctoral researcher at the University of Glasgow with degrees in
      Telecommunication Engineering from the University of Dar es Salaam and Information Communication Science and
      Engineering from NM-AIST Arusha, and Innocent Charles (Chief AI Officer), formerly an engineer at iPF Softwares
      and Neurotech Africa.


      The company's main product is Pawa, a Swahili-English generative AI assistant. Pawa is backed by Sartify's
      in-house model family released on Hugging Face under the sartifyllc organization, including Pawa-Gemma-Swahili-2B,
      a Swahili fine-tune of Google's Gemma 2B base model. Sartify reports training Pawa on over 50 billion
      Swahili-language tokens. The company also operates the Swahili LLM Leaderboard on Hugging Face Spaces to track
      open-model performance on Swahili evaluations, which gives the work a benchmarking artifact other groups can use.


      Swahili is the official language of Tanzania and is spoken by an estimated 100 million people across East Africa,
      but it is severely under-represented in the pretraining corpora of frontier commercial models. The category
      Sartify sits in includes Jacaranda Health's UlizaLlama and Lelapa AI's InkubaLM, all targeting African
      low-resource languages. Sartify's choice to release weights and benchmarks openly on Hugging Face places its work
      on the open side of that category.


      Mozilla selected Sartify for the first Mozilla Builders Accelerator cohort, announced September 23, 2024, with
      awards of up to $100K plus mentorship under the local-AI theme. Mozilla Builders rules require participating
      projects to release their work under open-source licenses. The grant sits at the training, weights, and data
      layers of the open stack: Sartify is producing model artifacts, training pipelines, and Swahili-language data that
      other African-language efforts can build on rather than a single closed product.
    sources:
