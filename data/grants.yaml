      behavior evaluation) and at weights (their open-sourced SAEs are first-class artifacts that derive from but
      operate on open-weights base models). The company is one of a small number of mechanistic-interpretability vendors
      operating at production scale alongside in-house teams at Anthropic, OpenAI, and Google DeepMind.
