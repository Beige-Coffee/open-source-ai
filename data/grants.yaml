  - title: CANVAS Global Education for Nonviolent Engagement (GENE)
    kind: project
    funder: hrf
    recipient: CANVAS
    date: "2025-11-24"
    amount_label: Undisclosed
    layers:
      - agents
      - retrieval-memory
    region: EU
    url: https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/
    description: >-
      AI-powered tool trained on decades of frontline nonviolent organizing experience. Helps activists plan campaigns,
      coordinate action, and respond in moments of crisis with strategy guidance grounded in CANVAS's documented case
      archive.
    explainer: >-
      The Human Rights Foundation funded CANVAS Global Education for Nonviolent Engagement (GENE) on November 24, 2025,
      in the first round of its AI for Individual Rights program. CANVAS, the Centre for Applied Nonviolent Action and
      Strategies, is the Belgrade nonprofit founded in 2003 by Srdja Popovic and Slobodan Djinovic, both leaders of the
      Otpor! student resistance movement that played a central role in ousting Slobodan Milosevic in 2000.


      CANVAS works as a training and research organization for nonviolent civil resistance, with public reporting of
      activity across 52 countries, training of more than 16,000 activists, and assistance to 126 campaigns. Its case
      archive spans pro-democracy movements in Iran, Zimbabwe, Burma, Venezuela, Ukraine, Georgia, Palestine, Western
      Sahara, West Papua, Eritrea, Belarus, Azerbaijan, Tonga, Tunisia, and Egypt, among others. The organization's
      publicly available CANVAS Core Curriculum, a 600-plus-page strategy guide co-authored with Hardy Merriman, is the
      underlying corpus for movement work on movement identity, communication strategy, fear and morale, tactical
      innovation, and post-victory transitions.


      GENE is positioned as an AI assistant grounded in that corpus. Rather than relying on a generic large model's
      encyclopedic recall of historical movements, the tool is designed to retrieve and reason over CANVAS's
      primary-source case archive and curriculum so activists can ask campaign-planning, crisis-response, and
      tactical-sequencing questions and receive answers backed by documented precedent. The methodology fits the
      retrieval-augmented pattern: a curated, vetted corpus combined with a model that defers to that corpus rather than
      improvising.


      Individual grant amounts in the first round were not disclosed. CANVAS joined seven other first-round grantees:
      Maple AI, Routstr, The Bridge Project, PlebDevs, OpenCode, Sovereign Engineering, and Citizen Power Initiatives
      for China.
