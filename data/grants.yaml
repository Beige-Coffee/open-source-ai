    region: Global
    url: https://www.templetonworldcharity.org/our-priorities/discovery/diverse-intelligences
    description: >-
      Four global hubs funded to coordinate interdisciplinary research at the intersection of AI and cognitive science.
      Each hub administers seed funding for early-career researchers and international collaborations.
    explainer: >-
      Templeton World Charity Foundation's Diverse Intelligences priority funds research that crosses the boundary
      between human cognition, animal cognition, and artificial intelligence. The priority began in 2016 and seeded a
      community of researchers in neuroscience, psychology, philosophy, anthropology, biology, and AI. The September
      2025 hub announcement consolidated this community into four multi-year hubs sited at Princeton, Macquarie, and a
      joint hub at the University of St Andrews and Indiana University (counted by Templeton as one hub but
      operationalized across both institutions).


      Each hub has named co-leads and a thematic focus. The Princeton hub is led by Tom Griffiths, Tania Lombrozo, and
      Sarah-Jane Leslie, taking a comparative approach to AI and cognitive science. The St Andrews / Indiana hub is led
      by Josep Call and Amanda Seed at St Andrews School of Psychology and Neuroscience, collaborating with Indiana
      University's Center for Possible Minds led by Jacob Foster and Erica Cartmill; its scope spans animal cognition,
      human creativity, and AGI. The Macquarie hub, with reported funding of approximately AUD $1.2 million, is directed
      by Andrew Barron and focuses on early-career leadership and collaborations across AI development, the evolution of
      cognition, and human cognitive wellbeing.


      Each hub administers seed funding for early-career researchers and runs international convenings and visitor
      programs. The structural intent, per the Templeton announcement, is to make the Diverse Intelligences community
      legible as a coordinated international research network rather than a set of disconnected grants.


      Within the open-source AI stack the work sits primarily at evaluation (treating "intelligence" as a measurable
      property across substrates rather than as a benchmark score on text tasks) and governance (the public framing
      around what kinds of intelligence AI systems possess relative to humans and other animals). It is methodologically
      adjacent to the cognitive-science-of-LLMs work at places like NYU's CILVR and MIT's BCS, but with a substantially
      broader comparative-cognition span.
