  - title: OLMo 3 / Molmo 2 release line
    kind: project
    funder: ai2
    recipient: AI2 internal teams
    date: 2025-11
    amount_label: Internal Ai2 funding
    layers:
      - weights
      - data
    region: US
    url: https://allenai.org/blog
    description: >-
      OLMo 3 family released November 2025; OLMo 3.1 December 2025; Molmo 2 video December 2025. The only major
      fully-open model lineage.
    explainer: >-
      Ai2's OLMo and Molmo release line shipped three artifacts in late 2025: the OLMo 3 family in November 2025, OLMo
      3.1 in December 2025, and Molmo 2 video in December 2025. The cadence reflects the lab's policy of releasing
      weights, training data, training code, and intermediate checkpoints together rather than weights alone.


      Among the major US labs publishing model weights in this period, the OLMo and Molmo lineage is the only one that
      is consistently fully open across data, training recipe, and weights. Most peer releases are open-weights only,
      which means independent researchers cannot reproduce the training run or audit the data mixture. Internal Ai2
      funding covers the work, so the release line functions as a public good rather than a grant payable to an external
      recipient.
    sources:
      - title: Allen Institute for AI blog
        url: https://allenai.org/blog
  - title: Common Pile v0.1
    kind: project
    funder: ai2
    recipient: EleutherAI
    date: 2025-06
    amount_label: Compute + collaboration
    layers:
      - data
    region: US
    url: https://www.eleuther.ai/research
    description: >-
      License-clean training dataset; trained two reference models from it. The cleanest open-data exemplar besides
      Dolma.
    explainer: >-
      EleutherAI released Common Pile v0.1 in June 2025, a training corpus assembled only from works whose licenses
      permit redistribution and reuse. The team trained two reference models on the dataset, Comma v0.1-1T and Comma
      v0.1-2T, to demonstrate that competitive open-weights models can be trained without scraped or contested data.


      The project was a multi-institution collaboration. EleutherAI led the work in partnership with Poolside, Hugging
      Face, and the US Library of Congress, with Ai2 listed among the partnering institutions providing compute and
      collaboration. The release sits alongside Ai2's Dolma as one of the two largest license-clean pretraining corpora
      available to outside teams, and is the cleanest open-data exemplar besides Dolma for groups that need to defend
      their training data provenance.
    sources:
      - title: Common Pile v0.1 (EleutherAI blog)
        url: https://blog.eleuther.ai/common-pile/
      - title: "TechCrunch: EleutherAI releases massive AI training dataset"
        url: >-
          https://techcrunch.com/2025/06/06/eleutherai-releases-massive-ai-training-dataset-of-licensed-and-open-domain-text/
      - title: EleutherAI Research
        url: https://www.eleuther.ai/research
