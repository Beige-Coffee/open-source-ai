      Socratic Mirror is positioned as an AI thought partner designed to interrogate the user rather than answer them,
      modeling Socratic questioning to push deeper thinking instead of optimizing for user satisfaction. The product
      framing inverts the default assistant pattern, in which a system competes to give the most agreeable answer. The
      cohort's 90-day prototype window applies, so the deliverable target is a working demo of the inverted-assistant
      pattern rather than a production product.


      Within the cohort Socratic Mirror sits in the agents and evaluation cross-section, in a thematic cluster with
      Socratica and Argument Debugger, all three of which treat the quality of the user's reasoning as the unit of value
      rather than the helpfulness of the assistant's answer. The lock-in vector being addressed is the bias in
      instruction-tuned assistants toward sycophancy and engagement, which the cohort's framing treats as a distortion
      of the user's own inquiry.
    sources:
      - title: Introducing the first cohort of AI x Truth-Seeking grantees (Cosmos Institute blog)
        url: https://blog.cosmos-institute.org/p/introducing-the-first-cohort-of-ai
      - title: Zhongying Qiao at The GitHub Blog
        url: https://github.blog/author/cryptoque/
      - title: Zhongying Qiao at Notre Dame Sites (CV)
        url: https://sites.nd.edu/zhongying-qiao/curriculum-vitae/
  - title: Socratica
    kind: project
