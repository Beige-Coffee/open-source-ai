    explainer: >-
      The Plurality Institute's LLM Map is a collaboratively built catalog of current and emerging tools that use
      language models to strengthen public discourse. The map was launched at the institute's February 2025 LLM
      Workshop.


      The catalog highlights more than 70 tools, organized along functional dimensions that span deliberation support,
      moderation, summarization of public input, and adjacent civic-tech use cases. It serves both as a coverage
      artifact for the field and as a discovery surface for funders and researchers entering the space.


      The map sits at the evaluation and governance meta-layers: it is less a product than a survey of where LLM-driven
      deliberation tooling currently exists, what gaps remain, and which efforts overlap.
