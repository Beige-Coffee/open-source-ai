  - title: Praxis-based AI alignment values
    kind: project
    funder: cosmos-institute
    recipient: Peli Grietzer
    date: "2024-12-17"
    amount_label: $1K-$10K range
    layers:
      - evaluation
      - governance
    region: US
    url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
    description: >-
      Harvard-trained researcher bridging philosophy, AI, and literary humanities. Defines praxis-based values inspired
      by virtue ethics to guide AI alignment beyond rule-based approaches.
    explainer: >-
      Peli Grietzer is an AI alignment researcher at Arb Research with a PhD in mathematically informed literary theory
      from Harvard Comparative Literature, completed in collaboration with the Hebrew University Einstein Institute of
      Mathematics. His research applies machine learning theory to "ambient" phenomena like moods, vibes, and cultural
      logics, sitting at an unusual intersection of literary studies, philosophy of mind, and ML.


      The praxis-based alignment program rejects the dominant utility-function framing for AI behavior. Grietzer's
      argument, developed across four years and published as the essay "After Orthogonality" on The Gradient, is that
      rational agents do not align actions to fixed goals but to practices: networks of action-dispositions, evaluation
      criteria, and shared resources that structure, clarify, and reinforce themselves. The implication is that
      alignment cannot be expressed as a static reward function or rule set, and must instead be cultivated as a set of
      learned dispositions over time. The position draws on virtue-ethics traditions that treat rationality and value as
      entangled rather than orthogonal.


      Cosmos Institute selected Grietzer for its second cohort, announced December 17, 2024, alongside Raphael Milliere,
      Sam Klein, and Seth Lazar. Grants in this cohort fall in the institute's $1K to $10K fast-grant band. The work
      sits at the governance and evaluation cross-layers of the open AI stack: it shapes how alignment criteria are
      written and what counts as a valid behavioral specification, upstream of the actual training and runtime tooling.
    sources:
      - title: Announcing the second cohort of Cosmos
        url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
      - title: "After Orthogonality: Virtue-Ethical Agency and AI Alignment"
        url: https://thegradient.pub/virtue-ethics-ai-alignment/
  - title: Variable-binding interpretability infrastructure
    kind: project
    funder: cosmos-institute
    recipient: Raphaël Millière
    date: "2024-12-17"
    amount_label: $1K-$10K range
    layers:
      - evaluation
      - weights
    region: US
    url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
    description: >-
      Macquarie University philosopher of mind developing open infrastructure for AI interpretability research, focused
      on how neural networks bind variables, a long-standing question in cognitive science.
    explainer: >-
      Raphael Milliere, at the time of the December 17, 2024 Cosmos award an Assistant Professor in Philosophy of
      Artificial Intelligence at Macquarie University, works on the cognitive science of large neural networks. He has
      since moved to the University of Oxford's Institute for Ethics in AI. His research program treats variable
      binding, the ability to temporarily associate symbols with values while keeping their identity, as the question
      that decides whether transformer models can perform genuinely symbolic computation.


      The technical work, published as "How Do Transformers Learn Variable Binding in Symbolic Programs?" on arXiv
      (2505.20896), trains transformers on synthetic programs of variable assignments and dereferences, then uses
      mechanistic interpretability methods, including causal interventions, to reverse-engineer how the model implements
      the task. The paper identifies three training phases: random constant prediction, a shallow heuristic that prefers
      early assignments, and finally the emergence of a systematic dereferencing mechanism. The trained model uses the
      residual stream as an addressable memory space, with specific attention heads routing variable values across token
      positions and layers.


      Variable binding has been a long-standing dividing line in cognitive science between connectionist and
      classical-symbolic accounts. Showing that transformers learn to implement it without dedicated architecture, and
      that the implementation is legible to interpretability tools, lands at the evaluation and weights cross-layers of
      the open stack. The grant falls in the Cosmos fast-grant range of $1K to $10K. The deliverable is open
      interpretability infrastructure rather than a closed product, consistent with the institute's emphasis on
      artifacts other researchers can build on.
    sources:
      - title: Announcing the second cohort of Cosmos
        url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
      - title: How Do Transformers Learn Variable Binding in Symbolic Programs?
        url: https://arxiv.org/abs/2505.20896
      - title: Raphael Milliere, Oxford Institute for Ethics in AI
        url: https://www.oxford-aiethics.ox.ac.uk/raphael-milliere
  - title: Public AI digital library
    kind: project
    funder: cosmos-institute
    recipient: Sam Klein (Public AI Network)
    date: "2024-12-17"
    amount_label: $1K-$10K range
    layers:
      - data
      - sovereignty-decentralization
    region: US
    url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
    description: >-
      Cofounder of Public AI Network and longtime Wikipedian mapping how a public-good global digital library powered by
      generative AI could be built and governed.
    explainer: >-
      Samuel "SJ" Klein is a cofounder of the Public AI Network and a longtime Wikimedian, having served as a trustee of
      the Wikimedia Foundation and as content director for One Laptop per Child. He is also a cofounder of Knowledge
      Futures Group, which builds platforms for community-owned publishing, and is affiliated with the Berkman Klein
      Center at Harvard. His career has consistently centered on open knowledge infrastructure.


      The Public AI Network, which Klein cofounded, frames AI as public infrastructure that should be provisioned like
      electricity, libraries, or the public internet: accessible, accountable, and constituted as a public good. The
      coalition's "moonshots" list includes an open-source large language model, a "library of Alexandria" of public
      training data, a CERN-scale public compute facility, and governance frameworks to sit above them. The Public AI
      Libraries project is a more concrete sub-effort that bundles AI tools for libraries and educational institutions.


      The Cosmos grant, in the institute's $1K to $10K fast-grant range and announced December 17, 2024, funds Klein's
      scoping work on how a globally governed public digital library could be built in the era of generative models. The
      output is design and governance work rather than a single code artifact. It sits at the data and
      sovereignty-decentralization cross-layers: the project is upstream of training corpora, and the governance posture
      is an explicit alternative to centralized data accumulation by frontier labs.
    sources:
      - title: Announcing the second cohort of Cosmos
        url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
      - title: Public AI Network
        url: https://publicai.network/
      - title: SJ Klein at Berkman Klein Center
        url: https://cyber.harvard.edu/people/sklein
  - title: Open agent economy infrastructure
    kind: project
    funder: cosmos-institute
    recipient: Seth Lazar
    date: "2024-12-17"
    amount_label: $1K-$10K range
    layers:
      - agents
      - governance
      - sovereignty-decentralization
    region: Global
    url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
    description: >-
      Australian National University political philosopher developing technical and regulatory groundwork for an open
      agent economy that resists centralization by the largest agent platform companies.
    explainer: >-
      Seth Lazar is Professor of Philosophy at the Australian National University and founding director of the Machine
      Intelligence and Normative Theory Lab. He is also a Distinguished Research Fellow at the Oxford Institute for
      Ethics in AI, a Carnegie Endowment fellow, and a Senior AI Advisor to the Knight First Amendment Institute at
      Columbia. His research focuses on the political philosophy of AI, with recent published work on the political
      economy of data and AI and on the governance of AI systems by other AI systems.


      The grant funds scoping work on what Lazar calls the "agent economy": the emerging space of user-to-agent and
      agent-to-agent interactions as language models start mediating commerce, information access, and institutional
      procedures. His MINT Lab research questions ask what institutions and protocol-level infrastructure are needed to
      prevent an era of "platform agents" where a small number of providers capture most agent traffic, in the same way
      that a small number of platforms captured most web and mobile traffic. The 2025 preprint "Infrastructure for AI
      Agents," coauthored with Alan Chan, Markus Anderljung, and others, sets out three required infrastructure
      functions: attributing actions to specific agents and users, shaping interactions between agents, and detecting
      and remedying harms.


      The grant falls in the Cosmos fast-grant range of $1K to $10K, announced December 17, 2024. It sits at the agents,
      protocols, and sovereignty-decentralization cross-layers of the open stack: the work is about who owns and governs
      the rails that future agent traffic will run on, and whether those rails are open or captured. It complements
      other awards in the same cohort that center decentralization and autonomy as design constraints rather than
      afterthoughts.
    sources:
      - title: Announcing the second cohort of Cosmos
        url: https://blog.cosmos-institute.org/p/announcing-the-second-cohort-of-cosmos
