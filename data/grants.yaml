  - title: OLMo 3 / Molmo 2 release line
    kind: project
    funder: ai2
    recipient: AI2 internal teams
    date: 2025-11
    amount_label: Internal Ai2 funding
    layers:
      - weights
      - data
    region: US
    url: https://allenai.org/blog
    description: >-
      OLMo 3 family released November 2025; OLMo 3.1 December 2025; Molmo 2 video December 2025. The only major
      fully-open model lineage.
    explainer: >-
      Ai2 released the OLMo 3 family on November 20, 2025: a dense-transformer suite at 7B and 32B parameters with three
      post-training variants per size, Base, Think (reasoning), and Instruct (chat plus tool use), plus an RL Zero
      training artifact. Pretraining ran on the Dolma 3 Mix, a 5.9T-token subset of the broader 9.3T-token Dolma 3 open
      dataset covering web text, scientific literature, and code. All weights ship under Apache 2.0 alongside training data, training code (OLMoCore
      framework, Open Instruct post-training pipeline), and intermediate checkpoints.


      Olmo 3-Think (32B) is reported as the strongest fully open reasoning model in its size class, narrowing the gap to
      Qwen 3-32B-Thinking while trained on roughly six times fewer tokens. Olmo 3-Instruct (7B) outperforms Qwen 2.5,
      Gemma 3, and Llama 3.1 on instruction-following benchmarks per the Ai2 release. The supporting toolchain published
      with the release includes Duplodocus for deduplication, Datamap-rs for data cleaning, OLMES for evaluation, and
      Decon for test-set decontamination, the same internal pipeline Ai2 uses for its own training runs.


      Molmo 2 followed on December 16, 2025: an open multimodal family at 4B, 7B, and 8B parameters, with Molmo 2-O (7B)
      built on the Olmo backbone so the full vision-language stack is end-to-end open. The 8B model surpasses the prior
      72B Molmo in accuracy, temporal understanding, and pixel-level grounding, and the release claims it bests Gemini 3
      on video tracking benchmarks. Nine new training datasets totaling more than 9 million multimodal examples (video
      captions, long-form QA, grounding, tracking, multi-image reasoning) shipped with the model weights.


      Among US labs publishing model weights in late 2025, the OLMo and Molmo lineage is the only one that is
      consistently fully open across data, training recipe, and weights. Most peer releases (Llama, Mistral, Qwen) ship
      weights without the training corpus, which means independent researchers cannot reproduce the run, audit the data
      mixture for memorization or contamination, or retrain from scratch with substitutions. Internal Ai2 funding covers
      the work, so the release line functions as a public-goods publication rather than a grant payable to an external
      recipient.
    sources:
      - title: "Olmo 3: Charting a path through the model flow (Ai2)"
        url: https://allenai.org/blog/olmo3
      - title: Olmo 3 announcement (Ai2)
        url: https://allenai.org/olmo
      - title: "Molmo 2: State-of-the-art video understanding, pointing, and tracking (Ai2)"
        url: https://allenai.org/blog/molmo2
      - title: Olmo 3 family coverage (MarkTechPost)
        url: >-
          https://www.marktechpost.com/2025/11/20/allen-institute-for-ai-ai2-introduces-olmo-3-an-open-source-7b-and-32b-llm-family-built-on-the-dolma-3-and-dolci-stack/
  - title: Common Pile v0.1
    kind: project
    funder: ai2
    recipient: EleutherAI
    date: 2025-06
    amount_label: Compute + collaboration
    layers:
      - data
    region: US
    url: https://www.eleuther.ai/research
    description: >-
      License-clean training dataset; trained two reference models from it. The cleanest open-data exemplar besides
      Dolma.
    explainer: >-
      EleutherAI released Common Pile v0.1 in June 2025: an 8TB pretraining corpus assembled exclusively from works
      whose licenses permit redistribution, modification, and reuse for any purpose. The corpus draws from 30 sources,
      including roughly 300,000 public-domain books from the Library of Congress and the Internet Archive, the openly
      licensed subset of Stack v2 (code), arXiv papers, PubMed abstracts, and other curated openly licensed text. The
      acceptance criterion is the Open License Definition, which excludes both proprietary and ambiguously licensed
      content; works whose license status could not be confirmed were dropped.


      The team trained two 7B reference models, Comma v0.1-1T and Comma v0.1-2T, for 1 trillion and 2 trillion tokens
      respectively. Comma reportedly outperforms models trained on KL3M, OLC, and Common Corpus, matches models trained
      on The Pile and OSCAR, and shows a gap relative to FineWeb-trained models. The point of the reference run is to
      test whether a license-clean corpus can produce models comparable to those trained on scraped or contested data;
      the result was that it can within the same training regime, with a measurable but not catastrophic gap to the best
      web-scraped corpora.


      The project was a multi-institution collaboration. EleutherAI led the work in partnership with Poolside, Hugging
      Face, and the US Library of Congress, with Ai2 among the partnering institutions providing compute and
      collaboration. The arXiv paper (Kandpal et al., 2506.05209) documents the source-by-source license verification
      process, which is the part that is hard to replicate and the reason a license-clean corpus at this scale was not
      previously available.


      Common Pile sits alongside Ai2's Dolma as one of the two largest license-clean pretraining corpora available to
      outside teams. For groups that need to defend the provenance of their training data, whether for EU AI Act
      compliance, US copyright litigation exposure, or downstream commercial licensing, these two corpora are the
      practical floor. The competing alternative is to train on scraped web data and hope discovery does not reach the
      training set, which is the bet most commercial labs are currently making.
    sources:
      - title: The Common Pile v0.1 (EleutherAI blog)
        url: https://blog.eleuther.ai/common-pile/
      - title: "The Common Pile v0.1: 8TB Dataset of Public Domain and Openly Licensed Text (arXiv 2506.05209)"
        url: https://arxiv.org/pdf/2506.05209
      - title: EleutherAI releases massive AI training dataset (TechCrunch, June 6 2025)
        url: >-
          https://techcrunch.com/2025/06/06/eleutherai-releases-massive-ai-training-dataset-of-licensed-and-open-domain-text/
  - title: OpenEuroLLM consortium kickoff
    kind: project
    funder: eu-horizon
    recipient: Multi-partner EU consortium
    date: 2025-Q4
    amount_usd: 60000000
    amount_label: €55M+ (~$60M) for OpenEuroLLM
    layers:
      - weights
      - data
    region: EU
    url: >-
      https://digital-strategy.ec.europa.eu/en/news/eu-invests-over-eu307-million-artificial-intelligence-and-related-technologies
    description: Open multilingual European LLM consortium funded under Horizon Europe.
    explainer: >-
      OpenEuroLLM is a 20-partner European consortium coordinated by Jan Hajic (Charles University) and co-led by Peter
      Sarlin (AMD Silo AI), funded under the EU Digital Europe Programme with an allocation of roughly €55M (about
      $60M). The consortium commenced work on February 1, 2025, with partners spanning European research institutions,
      companies, and EuroHPC supercomputing centres. The stated goal is an open multilingual LLM covering all official
      EU languages, on the theory that US frontier models have uneven coverage outside English and that European
      data-protection law constrains commercial reliance on US-hosted inference.


      In December 2025, OpenEuroLLM became the first AI project to be granted strategic access to multiple EuroHPC
      supercomputers simultaneously, with 10 million GPU hours allocated across LUMI (Finland), Leonardo (Italy),
      Jupiter (Germany), and MareNostrum 5 (Spain). The training plan calls for an 8B model by summer 2026 followed by a
      larger model using the strategic compute allocation. The related EuroLLM initiative is targeting eventual model
      sizes at 7B, 30B, 65B, and 200B parameters plus a distilled 7B model, though OpenEuroLLM's own size targets beyond
      8B have not been firmly committed.


      The consortium sits inside a broader €307M EU AI investment package announced in early 2025 and is the largest
      publicly funded open-model effort in Europe. The partner list mixes academic labs (Tübingen AI Center, University
      of Edinburgh, Charles University) with industrial participants (AMD Silo AI) and the EuroHPC centres that supply
      the compute, the same hybrid structure used by US lab-and-university collaborations on open models.


      The sovereignty argument is explicit: the consortium frames the work as European AI infrastructure that does not
      depend on US clouds for training or inference. The practical test will be whether the released models reach
      competitive quality at competitive sizes; the 8B summer 2026 milestone is the first checkpoint that will reveal
      whether the consortium model can match the pace of US single-lab releases.
    sources:
