grants:
  - title: Open Multimodal AI Infrastructure (OMAI) partnership
    kind: project
    funder: nsf
    recipient: Allen Institute for AI
    date: 2025-08
    amount_usd: 152000000
    amount_label: $152M (NSF $75M + NVIDIA $77M)
    layers:
      - weights
      - data
      - compute
    region: US
    url: https://allenai.org/blog/nsf-nvidia
    description: >-
      First major US public funding crossing into open foundation-model training at scale. Compute infrastructure plus
      open data plus OLMo lineage.
    explainer: >-
      The Allen Institute for AI (Ai2) was awarded a combined $152M to build a national-scale fully open AI training
      program, with $75M from the U.S. National Science Foundation and $77M from NVIDIA. The partnership was announced
      on August 14, 2025.


      The program covers compute infrastructure plus open training data plus the OLMo model lineage, Ai2's family of
      openly released foundation models. The structure pairs federal research funding with industry-supplied
      accelerators rather than routing public dollars through a closed lab.


      In context, this is the largest single commitment of U.S. public money to fully open foundation-model training at
      frontier scale. It positions Ai2 alongside European efforts like OpenEuroLLM as one of the few institutions with
      both the compute and the mandate to release weights, data, and training code together.
    sources:
      - title: "Ai2 announcement: NSF and NVIDIA partnership"
        url: https://allenai.org/blog/nsf-nvidia
  - title: Technical AI Safety RFP
    kind: program
    funder: open-philanthropy
    recipient: Multiple grantees
    date: 2025-04
    amount_usd: 40000000
    amount_label: $40M+
    layers:
      - safety-guardrails
      - evaluation
    region: Global
    url: https://www.openphilanthropy.org/request-for-proposals-technical-ai-safety-research/
    description: Closed April 15, 2025. Distributed across 21 technical safety areas.
    explainer: >-
      Open Philanthropy (now operating as Coefficient Giving) issued a Technical AI Safety request for proposals that
      closed on April 15, 2025, with roughly $40M planned across the cohort over the following five months. The RFP
      partitioned funding across 21 distinct technical research areas, the breadth signaled in the funder's own
      announcement title.


      The 21 areas span interpretability, scalable oversight, alignment theory, robustness, evaluations, and adjacent
      technical safety questions. Individual grant sizes were not pre-specified at the funder level; the program was
      designed to absorb varied proposal scales rather than fund a single named cohort.


      The RFP page now redirects through Open Philanthropy's rebrand to coefficientgiving.org. As a single-cycle
      commitment, this was among the larger technical safety funding pools opened to outside researchers in 2025 and
      sets a useful baseline for what mid-7-figure safety RFPs look like at scale.
    sources:
      - title: Open Philanthropy Technical AI Safety RFP (redirects to Coefficient Giving)
        url: https://www.openphilanthropy.org/request-for-proposals-technical-ai-safety-research/
      - title: Coefficient Giving Technical AI Safety RFP page
        url: https://coefficientgiving.org/request-for-proposals-technical-ai-safety-research
      - title: Open Philanthropy Technical AI Safety RFP - $40M available across 21 research areas (EA Forum)
        url: >-
          https://forum.effectivealtruism.org/posts/XtgDaunRKtCPzyCWg/open-philanthropy-technical-ai-safety-rfp-usd40m-available
