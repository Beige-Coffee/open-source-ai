        url: https://eclipsesource.com/blogs/2025/03/13/introducing-theia-ai/
      - title: Theia AI and the Theia IDE support MCP (EclipseSource)
        url: https://eclipsesource.com/blogs/2024/12/19/theia-ide-and-theia-ai-support-mcp/
      - title: Eclipse Theia 1.58 release notes
        url: https://eclipsesource.com/blogs/2025/02/06/eclipse-theia-1-58-release-news-and-noteworthy/
  - title: Latent Scope
    kind: project
    funder: mozilla
    recipient: Latent Scope
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - data
      - evaluation
    region: US
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Local pipeline and visualization environment for embedding, clustering, and categorizing datasets with LLMs.
      Operates entirely on the user's machine.
    explainer: >-
      Latent Scope is built by Ian Johnson (enjalot), an independent data visualization researcher known earlier for
      d3.js-era work. The project describes itself as a scientific instrument for investigating latent spaces and
      packages a five-stage pipeline that turns an unstructured text dataset into an interactive map of clusters and
      themes.


      The pipeline runs locally end-to-end. Stage one embeds each row of text using either a local transformer model
      (BGE, E5 are referenced) or an API embedding (OpenAI, Mistral). Stage two reduces the embedding to two dimensions
      with UMAP. Stage three clusters the 2D points with HDBSCAN. Stage four labels each cluster by passing
      representative points to an LLM (Zephyr 7B locally, or GPT-3.5-class via API) for summarization. Stage five
      renders the result as an interactive web scatterplot the user can pan, zoom, and query.


      Implementation is Python on the backend (command-line utilities orchestrate the pipeline) and React on the
      frontend. Storage is intentionally flat-file: HDF5 for embeddings, Parquet for tabular data, with metadata logging
      so each run is reproducible and the artifacts can be moved between machines. Demonstrated scales run from a few
      hundred rows up to several hundred thousand, including a 400,000-row emotion classification dataset.


      The Mozilla Builders Accelerator awarded Latent Scope up to $100K in the September 23, 2024 cohort. In the stack
      the project sits at the data and evaluation layers: it is a workbench for analysts who want to look at what an
      embedding model has actually clustered without uploading the dataset to a hosted vector service. The design choice
      to keep the full workflow on the user's machine matches the cohort's local-AI theme and makes the tool usable on
      sensitive datasets that cannot leave the host.
    sources:
      - title: Mozilla Builders inaugural cohort announcement
        url: >-
          https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
      - title: Latent Scope GitHub repository
        url: https://github.com/enjalot/latent-scope
  - title: Nx (Elixir machine learning)
    kind: project
    funder: mozilla
    recipient: Nx project / DockYard
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - training
      - runtime
    region: US
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Distributed machine-learning framework leveraging Elixir's concurrency and fault-tolerance properties as an
      alternative to Python-centric stacks.
    explainer: >-
      Nx is the Numerical Elixir project, a tensor library and JIT-compiled numerical computing stack for the BEAM
      virtual machine. It originated when Elixir creator Jose Valim reached out to Sean Moriarity, author of Genetic
      Algorithms in Elixir, and the two co-developed a numerical foundation comparable in role to NumPy for Python. The
      project is maintained under the elixir-nx GitHub organization, with significant ongoing contribution from
      DockYard, the consultancy that employed Moriarity and that received the Mozilla award on the project's behalf.


      Architecturally Nx defines a multi-dimensional Tensor type and a set of numerical definitions (`defn`) that are
      not interpreted as ordinary Elixir but compiled to an intermediate representation and lowered onto pluggable
      backends. The two production backends are EXLA, which targets Google's XLA compiler for CPU, GPU, and TPU
      acceleration, and Torchx, which targets LibTorch. The repository is roughly 94% Elixir and 6% C++, with the C++
      being the bindings to the foreign compilers.


      Above Nx sits a small set of higher-level libraries that together form the BEAM-native ML stack. Axon is
      Moriarity's neural-network library, designed with PyTorch-Ignite-style training loops. Bumblebee loads pretrained
      Hugging Face Transformers models directly into Elixir, lowering the barrier to use in production. Explorer wraps
      the Rust Polars library for DataFrame work. Livebook is the interactive notebook environment Valim built to host
      the whole stack and was the channel through which much of the early ML adoption happened. The elixir-nx
      organization now hosts roughly 18 projects.


      The Mozilla Builders Accelerator selected Nx from nearly 200 applications in the September 23, 2024 cohort with
      funding of up to $100K. In the stack Nx sits at the training and runtime layers, with the broader thesis that a
      fault-tolerant, concurrency-first runtime (BEAM) can host serious numerical workloads when paired with appropriate
      compiler backends, and that Phoenix-class Elixir applications can serve ML inline rather than calling out to a
      Python service.
    sources:
      - title: Mozilla Builders inaugural cohort announcement
        url: >-
          https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
