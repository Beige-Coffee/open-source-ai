  - title: AISI Inspect framework
    kind: project
    funder: aisi-alignment-project
    recipient: Open release
    date: "2025"
    amount_label: Internal funding; open release
    layers:
      - safety-guardrails
      - evaluation
    region: UK
    url: https://www.aisi.gov.uk/work
    description: Open-sourced evaluation harness from UK AISI; available for community use.
    explainer: >-
      Inspect is a Python framework for large language model evaluations developed by the UK AI Security Institute and
      Meridian Labs, open-sourced in April 2024 under MIT license. The codebase (UKGovernmentBEIS/inspect_ai) is roughly
      99.8% Python with a TypeScript and React web UI for viewing eval results. Built-in facilities cover prompt
      engineering, tool use, multi-turn dialog, model-graded evaluation, and third-party Python plugin extension.


      The framework abstracts over model providers, so a single eval can run against Anthropic, OpenAI, Google, or any
      HuggingFace-hosted model with a configuration change. Inspect Evals, the companion repository, ships more than 200
      prebuilt evaluations including agent benchmarks like GAIA, SWE-Bench, GDM CTF, and Cybench. The package supports
      both pip and uv for install, and the contributor stack runs on Quarto for documentation and standard Python
      tooling (Ruff, MyPy, pytest).


      Adoption has been wide for an evaluation harness with under two years of public history. AISI uses Inspect for
      nearly all of its automated frontier-model evaluations. External adopters include Anthropic, DeepMind, xAI (Grok),
      and other safety institutes plus organizations like Apollo Research and METR. Over 50 external contributors have
      committed to the framework, and the prebuilt eval catalog continues to receive community submissions, the most
      recent being Airside Labs' Pre-Flight Benchmark added to the community evaluations package.


      The structural argument for an open evaluation framework maintained by a government lab is the absence of a
      commercial incentive to favor any model family. Most existing eval frameworks (HELM, LM Eval Harness, OpenAI
      Evals) are either academic, vendor-affiliated, or community-maintained without institutional backing. AISI's
      funding model and mandate to evaluate frontier systems for the UK government give Inspect a different
      sustainability profile, and the explicit publication of the harness rather than only the eval results lets
      external teams reproduce AISI's methodology rather than trust its conclusions.
    sources:
      - title: Inspect AI on GitHub (UKGovernmentBEIS/inspect_ai)
        url: https://github.com/UKGovernmentBEIS/inspect_ai
      - title: Inspect documentation
        url: https://inspect.aisi.org.uk/
      - title: Announcing Inspect Evals (AISI Work)
        url: https://www.aisi.gov.uk/blog/inspect-evals
      - title: Inspect AI, An OSS Python Library For LLM Evals (Hamel Husain)
        url: https://hamel.dev/notes/llm/evals/inspect.html
  - title: "Sovereign Tech Fund: OpenSSH, curl, GNU coreutils maintenance"
    kind: program
    funder: sovereign-tech-fund
    recipient: Foundational open-source maintainers
    date: 2024-2026
    amount_usd: 24900000
    amount_label: €23M+ (~$24.9M) across 60 technologies in 2 years
    layers:
      - runtime
      - governance
    region: EU
    url: https://www.sovereign.tech/
    description: >-
      Funds critical infrastructure dependencies. Cross-cuts into AI runtime because many AI servers depend on these
      underlying tools.
    explainer: >-
      Germany's Sovereign Tech Fund (now Sovereign Tech Agency) is a public investment program of the Federal Ministry
      for Economic Affairs and Climate Action, implemented as a subsidiary of the Federal Agency for Disruptive
      Innovation (SPRIND). Between 2022 and late 2024 it invested more than €23M (about $24.9M) into roughly 60
      open-source projects; the running total had reached over €24.6M by 2025. In its first 12 months alone the agency
      disbursed €15.25M across 40 technology projects.


      The 2023 pilot round funded nine projects: OpenMLS, curl, OpenBGPd, Bundler/RubyGems, WireGuard, OpenPGP.js and
      GopenPGP, OpenSSH, Sequoia PGP, and Fortran. The Rust coreutils ("uutils") project, a memory-safe drop-in
      replacement for GNU coreutils, received €99,060 specifically to continue its rewrite, and the Reproducible Builds
      initiative received €353,430 to develop an archive snapshot service and improve Debian installer reproducibility.
      The portfolio later expanded to include the Python Software Foundation, FreeBSD, Eclipse Foundation,
      OpenStreetMap, Drupal, FFmpeg, GNOME, and PHP, with KDE receiving over €1M in May 2026.


      Alongside the maintenance fund, the agency runs the Bug Resilience program (launched 2023) focused on
      technical-debt reduction, secure code audits, and bug bounty programs, and a maintainer fellowship that pays
      previously volunteer maintainers of critical components. The structural premise is that these dependencies are
      strategic digital infrastructure and should not rely on unpaid volunteers.


      The agency is not an AI program, but the funded portfolio cross-cuts AI infrastructure because most AI training
      clusters, model-serving runtimes, and inference servers depend on these underlying tools. A coreutils, OpenSSH, or
      curl security incident would propagate through the entire AI supply chain. Germany's Sovereign Tech Agency is one
      of the few state actors funding this layer explicitly; OpenForum Europe is pushing for an EU-wide analog (EU
      Sovereign Tech Fund), and the OSI has formally endorsed that proposal.
    sources:
