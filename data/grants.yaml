    description: >-
      Developer education platform focused on Bitcoin and open-source technology launching an AI development course for
      beginners building open-source AI tools in repressive environments.
    explainer: >-
      The Human Rights Foundation announced support for PlebDevs on November 24, 2025, as one of eight grantees in the
      first round of its AI for Individual Rights program. The grant funds an AI development course aimed at beginners
      building open-source AI tools, with the program oriented toward learners working in environments where commercial
      AI services are unavailable, surveilled, or risky to depend on.


      PlebDevs is a developer education and content platform built on Nostr and integrated with the Lightning Network,
      founded by Austin Kelsay, who also works as developer-relations engineer at Voltage. The platform's existing
      curriculum walks beginners from zero coding experience through HTML, CSS, JavaScript, React, and Node.js, then
      into Lightning app development using LND and LNbits, and Nostr client work. Course content is published as Nostr
      long-form events (NIP-23) and the platform supports Lightning-payment unlocks via the Nostr Wallet Connect and zap
      primitives, making the site itself a working demo of the freedom-tech stack it teaches.


      The HRF-funded module extends this curriculum into AI development. Public descriptions from PlebDevs frame the new
      track as teaching learners to "use, understand, and stress-test AI from an adversarial developer perspective,"
      with material on models, providers, and tooling rather than a single proprietary API. The pedagogy fits HRF's
      brief: in repressive environments the relevant skill is not prompting a hosted assistant, it is wiring open
      weights, local runtimes, and self-custodial payment rails into something an activist can deploy.


      Individual grant amounts in the first round were not disclosed. The cohort grouped PlebDevs with Maple AI,
      Routstr, The Bridge Project, OpenCode, Sovereign Engineering, CANVAS, and Citizen Power Initiatives for China.
