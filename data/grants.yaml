    explainer: >-
      BridgingBot is an LLM-powered social-media moderator designed to foster constructive online dialogue. The
      Plurality Institute supported the project in February 2025, with Harvard, UC Berkeley, Jigsaw, and Google.org as
      collaborators.


      The bot steps into a thread to model the skills of a human mediator, paraphrasing positions and surfacing common
      ground rather than acting as a content-filter classifier. The work includes a randomized controlled trial of the
      bot in deployment, plus full open-sourcing of code and methods.


      The combination of an RCT for an LLM-driven civic-tech intervention and a commitment to open code and methodology
      is uncommon for moderation tooling, where most production systems are proprietary and unaudited.
