    url: https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/
    description: >-
      Brings builders together in a physical space to create freedom-enhancing tools on open networks like Bitcoin and
      Nostr. Over two cohorts, participants explore how AI can be integrated into censorship-resistant systems.
    explainer: >-
      The Human Rights Foundation announced funding for Sovereign Engineering on November 24, 2025, as part of the first
      round of its AI for Individual Rights program. The grant funds two cohorts that integrate AI work into Sovereign
      Engineering's existing Bitcoin and Nostr program.


      Sovereign Engineering runs a six-week in-person residency in Funchal, Madeira, with roughly 21 participants per
      cohort. The program was instigated by Gigi and Pablo Fernandez (PABLOF7z), and each cohort follows a weekly loop:
      Monday theme-setting, Tuesday talks, Wednesday workshops, Thursday open building, and a Friday Demo Day where
      every participant ships a working build with timeboxed six-minute demos and two-minute discussions. The stated
      design goal is "high-bandwidth ideation, collaboration, and rapid prototyping around Freedom Tech such as Bitcoin,
      Lightning, and Nostr," with an editorial preference for code the user can verify, fork, and exit from.


      The program functions as a pipeline for open-source freedom-tech projects. Public Sovereign Engineering materials
      list cohort outputs including Blossom (a Nostr-native blob storage primitive), Nutzaps, Wikifreedia, Nsite,
      TollGate, and Zapstore. Routstr, a separate HRF AI for Individual Rights grantee in the same November 2025 round,
      was built during SEC-05, which makes Sovereign Engineering a direct upstream for the freedom-tech projects HRF is
      now also funding individually.


      The HRF grant covers two upcoming cohorts and is specifically tagged to AI integration into censorship-resistant
      systems: local-first inference, Nostr-relayed agent communication, and Lightning-rails payment for compute, rather
      than thin wrappers on hosted chat APIs. Individual grant amounts in the first round were not disclosed.
