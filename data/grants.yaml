    explainer: >-
      The Frontier Model Forum's AI Safety Fund (AISF) announced its December 2025 round with 11 grantees receiving more
      than $5M in total. AISF is the industry-consortium safety fund jointly underwritten by Frontier Model Forum
      members, distinct from any single lab's internal grant program.


      The cohort's thematic scope spans scheming detection, biosecurity, decentralized AI oversight, and automated
      red-teaming. Named grantees include Apollo Research (black-box scheming monitors), the Caltech BioSentinel
      project, the Institute for Decentralized AI, and Faculty AI.


      Compared to single-funder safety RFPs of similar size, AISF's structure routes industry money through a neutral
      consortium toward external researchers, which is a relevant precedent for sovereignty-minded readers tracking how
      frontier-lab capital reaches the wider safety field.
