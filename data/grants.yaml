        url: https://www.sussex.ac.uk/broadcast/read/54135
  - title: Multistakeholder Engagement for Safe and Prosperous AI program
    kind: program
    funder: future-of-life-institute
    recipient: Multiple grantees (program-level)
    date: "2025-06-01"
    amount_usd: 5000000
    amount_label: $5M total, $100K-$500K per project
    layers:
      - governance
      - evaluation
    region: Global
    url: https://futureoflife.org/grant-program/multistakeholder-engagement-for-safe-and-prosperous-ai/
    description: >-
      FLI grant program for projects that engage, educate, and activate stakeholder groups and the public on AI futures.
      Letters of intent due February 2025; decisions June 2025.
    explainer: >-
      The Future of Life Institute's Multistakeholder Engagement for Safe and Prosperous AI program is a $5M total
      grantmaking line announced in late 2024, with per-project tickets of $100K to $500K. The program calendar ran
      Letters of Intent due February 4, 2025, full-proposal invitations issued February 24, 2025, and funding decisions
      scheduled for June 2025.


      The program's stated focus is on projects that engage specific stakeholder groups (industries, professions,
      civil-society communities) and on public-facing work that organizes and mobilizes broader audiences around AI
      policy questions. The framing is governance-adjacent rather than technical: outputs are expected to shape how
      non-expert publics, professional communities, and policy actors participate in AI decisions, rather than direct
      work on models, evaluations, or safety techniques. The program is administered by FLI's grants team and managed in
      parallel with the institute's existing technical-safety and PhD-fellowship lines.


      FLI itself is the Future of Life Institute, the nonprofit run by Max Tegmark that has been one of the largest
      non-governmental funders of long-term AI safety work since the 2015 Open AI Letter and the 2023 Pause Letter. Its
      EU policy work, led by Risto Uuk, contributed to the general-purpose AI and systemic-risk provisions in the EU AI
      Act, which gives a sense of the kind of multistakeholder engagement the new program is designed to scale.


      In the stack the program sits at the governance and evaluation layers and complements FLI's more research-coded
      grant lines. A complete public list of June 2025 grantees was not visible on the program page as of the time of
      this write-up, so per-project recipient details are not asserted here.
