        url: >-
          https://interoperable-europe.ec.europa.eu/collection/open-source-observatory-osor/document/funding-open-source-case-study-sovereign-tech-fund
  - title: MCP donation to Linux Foundation AAIF
    kind: project
    funder: linux-foundation-aaif
    recipient: Model Context Protocol project
    date: 2025-12
    amount_label: In-kind / governance handoff
    layers:
      - protocols
    region: Global
    url: https://www.linuxfoundation.org/press/linux-foundation-announces-the-formation-of-the-agentic-ai-foundation
    description: >-
      Anthropic donated MCP stewardship to Linux Foundation's new Agentic AI Foundation, alongside goose (Block) and
      AGENTS.md (OpenAI). Industry-consortium governance model.
    explainer: >-
      The Model Context Protocol (MCP) is a JSON-RPC based open standard introduced by Anthropic in November 2024 for
      connecting LLM clients to external tools, data sources, and prompts. The June 2025 spec revision classified MCP
      servers as OAuth Resource Servers and required clients to implement Resource Indicators per RFC 8707, formalizing
      the authentication path. By the November 2025 anniversary, the MCP SDKs were drawing over 97M monthly downloads
      and the central MCP server registry held close to 2,000 published servers, a 407% increase from the September 2025
      batch.


      OpenAI adopted MCP in March 2025 and integrated it across its products including the ChatGPT desktop application.
      Google, Microsoft, and other vendors have followed, making MCP the default agent-tool wire protocol across the
      major model providers' first-party products by late 2025.


      On December 9, 2025, Anthropic donated MCP stewardship to the Linux Foundation's newly formed Agentic AI
      Foundation (AAIF), transferring the specification, reference implementations, and trademark to the foundation. MCP
      was not donated alone: the AAIF also received Block's goose (an open agent framework) and OpenAI's AGENTS.md (a
      configuration convention for agentic codebases) as founding contributions. Platinum members at launch include AWS,
      Anthropic, Block, Bloomberg, Cloudflare, Google, Microsoft, and OpenAI, with Cisco and Oracle joining at Gold, and
      the membership had grown to 97 organizations by February 2026 under board chair David Nalley.


      The governance move follows the Cloud Native Computing Foundation pattern: a protocol originally owned by one
      vendor moves to a neutral foundation once competing vendors are all relying on it, which prevents any single owner
      from leveraging the specification for advantage. MCP also established a formal SEP (Specification Enhancement
      Proposal) process for contribution. The structural question for the open-AI stack is whether AAIF governance
      produces a faster-evolving and more interoperable protocol than the single-vendor steward it replaces, or whether
      the foundation pattern slows specification iteration as members negotiate consensus.
    sources:
      - title: Linux Foundation announces Agentic AI Foundation (Dec 9 2025)
        url: https://www.linuxfoundation.org/press/linux-foundation-announces-the-formation-of-the-agentic-ai-foundation
      - title: "One Year of MCP: November 2025 Spec Release (MCP blog)"
        url: https://blog.modelcontextprotocol.io/posts/2025-11-25-first-mcp-anniversary/
      - title: MCP Spec Updates from June 2025 (Auth0 blog)
        url: https://auth0.com/blog/mcp-specs-update-all-about-auth/
      - title: OpenAI, Anthropic, and Block join new Linux Foundation effort (TechCrunch)
        url: >-
          https://techcrunch.com/2025/12/09/openai-anthropic-and-block-join-new-linux-foundation-effort-to-standardize-the-ai-agent-era/
  - title: Maple AI
    kind: project
    funder: hrf
    recipient: OpenSecret
    date: "2025-11-24"
    amount_label: Undisclosed
    layers:
      - runtime
      - identity-trust
      - agents
    region: US
    url: https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/
    description: >-
      Open-source, end-to-end encrypted AI assistant built by OpenSecret using secure enclaves and confidential
      computing. Activists in authoritarian environments can use frontier LLMs without their queries being scanned,
      stored, or handed to governments. HRF support funds capability improvements and new features for activist research
      workflows.
    explainer: >-
      Maple AI is a private chat assistant built by OpenSecret on AWS Nitro Enclaves, with end-to-end encryption from
      the client device to the inference enclave. Conversations are encrypted client-side, sent through an encrypted
      channel into a hardware-isolated enclave (CPU-isolated, no persistent storage, no admin access, no external
      network), and the response is encrypted in the enclave before return. The architecture combines Nitro Enclaves
      with reproducible builds so that anyone can build the open-source codebase from GitHub and compare the resulting
      hash against the live cryptographic attestation from the enclave, verifying that the deployed binary matches the
      audited source.


      The product currently serves DeepSeek R1 and V3.1, OpenAI's GPT-OSS-120B, Qwen3 Coder 480B, Llama 3.3 70B, and
      Gemma 3 / Qwen3-VL 30B (multimodal). All inference runs inside the enclave; OpenSecret does not host an
      unencrypted log of prompts because the operator cannot see plaintext at any stage. The free tier covers core
      features; paid Starter, Pro, and Team plans add higher usage limits and pooled organizational access. Native
      applications ship for iPhone, iPad, and Android, with web access at trymaple.ai.


      The OpenSecret platform itself is open source and provides the underlying confidential-compute primitives: the
      developer platform is in Rust, an OpenSecret SDK is published in TypeScript, and a nitro-toolkit in Python
      collects utilities for Nitro Enclave development. Source is at github.com/OpenSecretCloud, with the Maple
      application code under github.com/OpenSecretCloud/Maple.


      HRF awarded Maple AI in its November 24, 2025 AI for Individual Rights round, the foundation's first dedicated AI
      grant cohort. The target user is a journalist, organizer, or human rights defender in an authoritarian environment
      who needs frontier-quality LLM help but cannot give an external provider an unencrypted log of every prompt. Maple
      AI's enclave architecture is the structural defense against subpoena or coercion of the provider, because the
      provider physically does not have access to plaintext to surrender. The competing alternatives are running local
      models (capability-limited at the laptop tier) or trusting a commercial provider's privacy policy (no
      cryptographic guarantee).
    sources:
