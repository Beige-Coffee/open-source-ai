  - title: Alignment Project cohort
    kind: program
    funder: aisi-alignment-project
    recipient: 60+ projects (UK)
    date: "2025"
    amount_usd: 35000000
    amount_label: £27M (~$35M)
    layers:
      - safety-guardrails
      - evaluation
    region: UK
    url: https://alignmentproject.aisi.gov.uk/
    description: 60+ alignment projects funded; individual grants up to £1M.
    explainer: >-
      The UK AI Safety Institute's Alignment Project awarded over £27M (approximately $35M) to more than 60 alignment
      projects in its 2025 cohort. Individual grants were capped at up to £1M, allowing the program to fund both small
      exploratory work and multi-researcher efforts.


      The Alignment Project sits inside AISI's broader mandate but operates as a discrete grants vehicle aimed at the
      external alignment research community rather than internal AISI staff. The £1M ceiling places it between the
      typical academic grant tier and the larger cohort-style awards from U.S. private funders.


      As a UK government-backed program with international applicants, the cohort is one of the larger public
      commitments to alignment-specific research outside the United States in 2025.
    sources:
      - title: Alignment Project (UK AISI)
        url: https://alignmentproject.aisi.gov.uk/
