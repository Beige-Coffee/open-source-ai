      for civil-society teams under authoritarian rule.
    explainer: >-
      HRF awarded OpenCode in the November 24, 2025 AI for Individual Rights round. OpenCode is a fully open-source
      agentic coding platform that runs entirely locally, with all source code inspectable by the user and no required
      dependency on a remote provider for the agent loop.


      The grant funds work on the platform's use by civil-society teams under authoritarian rule, where routing
      sensitive software work through corporate AI infrastructure is a surveillance risk. The local-first runtime is the
      structural defense: code that never leaves the developer's machine cannot be subpoenaed from a vendor, and the
      open codebase lets security teams audit what the agent actually does before deploying it on sensitive
      repositories.
