        url: https://nlnet.nl/
  - title: Claude for Open Source program
    kind: program
    funder: anthropic
    recipient: 10,000+ OSS maintainers
    date: 2026-02
    amount_label: Free Claude Max for eligible OSS maintainers (compute credits not cash)
    layers:
      - runtime
      - agents
    region: Global
    url: https://claude.com/contact-sales/claude-for-oss
    description: "Eligibility: 5K+ GitHub stars or 1M+ NPM/month. Closes June 30, 2026."
    explainer: >-
      Anthropic launched the Claude for Open Source program in February 2026, offering free Claude Max access to up to
      10,000 approved open source contributors. Applications close June 30, 2026 unless Anthropic raises the cap.


      Eligibility for the Maintainer Track requires being a primary maintainer or core team member of a public
      repository with 5,000 or more GitHub stars, or 1 million or more monthly NPM downloads. The benefit is compute
      access rather than cash, distinguishing this from grant programs that disburse funding directly.


      The structure mirrors a developer-relations move more than a traditional grant program: it lowers the marginal
      cost of using Anthropic's tooling for the open source population most likely to integrate Claude into widely
      deployed projects. For readers tracking how frontier labs interface with open source maintainers, the
      10,000-recipient ceiling sets a useful scale reference.
    sources:
      - title: Anthropic Claude for Open Source program terms
        url: https://claude.com/contact-sales/claude-for-oss
      - title: Anthropic Launches Claude for Open Source Program (AItoolsclub)
        url: https://aitoolsclub.com/anthropic-launches-claude-for-open-source-program-free-claude-max-for-6-months/
