    explainer: >-
      The Mercatus Center's Emergent Ventures program selected Jessie Chen in its 46th cohort (September 2025) for work
      on privacy-preserving machine-learning models that operate directly on encrypted data, without exposing the
      underlying inputs. Emergent Ventures grants typically fall in the $1K to $50K range, awarded at Tyler Cowen's
