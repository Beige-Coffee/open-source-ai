    explainer: >-
      The LLM Map is a survey of tools that use large language models to strengthen public discourse, pluralism, and
      social cohesion. The Plurality Institute and the Council on Technology and Social Cohesion convened more than
      seventy researchers and technologists in early 2025 to build it collaboratively, and launched the catalog at the
      institute's February 2025 LLM Workshop. The catalog covers more than seventy tools.


      The companion report, "Mapping LLM Tools for Public Discourse, Pluralism and Social Cohesion," was published in
      October 2025 with co-authors Matt DeVerna, David J. Gruening, Jen Hickey, Adnan, and others, with support from
      Google.org, Jigsaw, and the John Templeton Foundation. The report ships with an open companion dataset that new
      tools can be added to. The map organizes tools along functional dimensions including deliberation support,
      moderation and bridging, summarization of public input, and adjacent civic-tech use cases; specific tools surveyed
      include AI Objectives Institute's Talk to the City, Society Library's deliberation graphs, and the model-plurality
      taxonomy work by Christina Lu and others.


      The artifact is positioned at the evaluation and governance meta-layers. It functions as a coverage map for the
      field rather than as a product, and serves a triage role for funders and researchers entering the space who need
      to know which tools already exist, what categories are crowded, and which gaps remain.
