    url: https://hrf.org/latest/announcing-the-ai-hack-for-freedom-hackathon-winners/
    description: >-
      Safety app for journalists in high-risk environments. Reporters maintain a trusted contact network with shared
      location and status; a one-click SOS triggers response recommendations using the encrypted Maple AI assistant.
    explainer: >-
      Stringer Safety won a prize at the Human Rights Foundation's first AI Hack for Freedom hackathon, held at Bitcoin
      Park in Austin, Texas from January 17 to 18, 2026, with winners announced on January 21. The hackathon produced
      eight unique tools across competing teams and paired globally known dissidents with open-source developers on
      28-hour builds.


      The application is a safety tool for journalists working in high-risk environments. Reporters maintain a trusted
      contact network in the app, share periodic location and status updates with that network, and trigger a one-click
      SOS alert that surfaces context to those contacts and pulls response recommendations from the encrypted Maple AI
      assistant, itself a separate HRF grantee in the AI for Individual Rights program. The team has stated public plans
      to extend the application with end-to-end encrypted location sharing and messaging.


      The team was captained by Anjan Sundaram, a journalist who has worked as a stringer for The New York Times and The
      Associated Press in the Democratic Republic of Congo and Rwanda, won a Frontline Club award for war reporting from
      the Central African Republic, and authored three memoirs of journalism (Stringer, Bad News, and Breakup). Bad
      News, about the rise of dictatorship in Rwanda, drew threats severe enough to require protection from the New York
      Police Department and Scotland Yard. Sundaram also founded The Stringer Foundation to support frontline
      journalists, which makes the application a direct extension of the operational problem he has spent two decades
      inside.
