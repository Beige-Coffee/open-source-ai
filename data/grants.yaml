      - title: "Three Years of Nx: Growing the Elixir Machine Learning Ecosystem (DockYard)"
        url: https://dockyard.com/blog/2023/11/08/three-years-of-nx-growing-the-machine-learning-ecosystem
      - title: Nx GitHub repository
        url: https://github.com/elixir-nx/nx
  - title: Tölvera
    kind: project
    funder: mozilla
    recipient: Tölvera
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - evaluation
      - runtime
    region: EU
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Creative tool bridging art and science with self-organizing simulations that explore alternative models of
      intelligence. Produced by an artist-researcher in Iceland.
    explainer: >-
      Tölvera is a Python library for composing self-organizing simulations and using them as creative or musical
      instruments. The name is an Icelandic kenning the team coined: from tala (number), volva (prophetess), and vera
      (being), composed as "number being." It is developed by Jack Armitage at the Intelligent Instruments Lab, hosted
      at the Icelandic University of the Arts in Reykjavik.


      The lab is the project home of the ERC-funded Intelligent Instruments (INTENT) project, led by Professor Thor
      Magnusson under European Research Council Consolidator Grant agreement No. 101001848 (Horizon 2020). The grant
      funds a five-year, EUR 2M effort with a team that spans music, computer science, and philosophy: Magnusson,
      Armitage, Halla Steinunn Stefansdottir, Victor Shepardson, Nicola Privato, Miguel Angel Rozzoli, Halldor
      Ulfarsson, and others. The stated research question is what twenty-first-century AI means for creative music
      technology and what new instruments fall out of treating an ML model as a performer rather than a tool.


      Technically Tölvera is built on Taichi, a Python-embedded domain-specific language that compiles parallel kernels
      for CPU and GPU. Built-in behaviors include boids-style flocking, slime-mold (Physarum) growth,
      particle-life-style swarming, and reaction-diffusion-class patterns; the library exposes these as composable
      building blocks that can be combined into hybrid systems. Two adjacent libraries from the same lab handle the
      interfacing: iipyper provides Open Sound Control (OSC) for two-way communication with audio environments such as
      Max, SuperCollider, and TouchDesigner, and anguilla provides interactive machine learning so a performer can train
      mappings from sensor input to simulation parameters in real time.


      The Mozilla Builders Accelerator selected Tölvera in the September 23, 2024 cohort with funding of up to $100K,
      and the project was presented at NIME 2024 (New Interfaces for Musical Expression). In the stack it sits at the
      evaluation and runtime layers as a vehicle for probing what counts as intelligent behavior outside the LLM frame:
      closer to artificial-life research with a performance interface than to deep learning.
    sources:
