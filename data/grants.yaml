    description: >-
      Oxford-trained philosopher-computer-scientist developing a computational theory of virtue ethics for AI alignment,
      building grounded approaches to AI value learning rooted in Aristotelian rather than utilitarian frames.
    explainer: >-
      Cosmos Institute granted Rocco Hu on September 10, 2024 as part of the inaugural Cosmos Ventures cohort, a set of
      small grants designed to incubate prototypes at the intersection of philosophy and AI. The grant size sits in the
      $1K to $10K range that defined the inaugural cohort.


      Hu, an Oxford-trained philosopher and computer scientist, is developing a computational theory of virtue ethics
      for AI alignment. The framing aims to ground AI value learning in an Aristotelian rather than utilitarian frame,
      with the practical question being whether virtue-ethics primitives (habituation, phronesis, character traits) can
      be operationalized inside model training and evaluation rather than treated only as philosophical commentary on
      alignment.


      The project is one of several Cosmos Ventures grants pairing classical philosophical traditions with computational
      research methods.
