grants:
  - title: Open Multimodal AI Infrastructure (OMAI) partnership
    kind: project
    funder: nsf
    recipient: Allen Institute for AI
    date: 2025-08
    amount_usd: 152000000
    amount_label: $152M (NSF $75M + NVIDIA $77M)
    layers:
      - weights
      - data
      - compute
    region: US
    url: https://allenai.org/blog/nsf-nvidia
    description: >-
      First major US public funding crossing into open foundation-model training at scale. Compute infrastructure plus
      open data plus OLMo lineage.
    explainer: >-
      The Open Multimodal AI Infrastructure (OMAI) partnership is a $152M Mid-Scale Research Infrastructure award from
      the U.S. National Science Foundation ($75M) and NVIDIA ($77M), led by Noah A. Smith at the Allen Institute for AI
      (Ai2). The official Ai2 announcement is dated August 14, 2025; the compute cluster itself came online in May 2026.
      The program funds compute hardware plus the open data and open model lineage Ai2 already ships.


      The cluster runs on NVIDIA HGX B300 systems powered by Blackwell Ultra GPUs, deployed and managed in partnership
      with Cirrascale Cloud Services with Supermicro supplying the underlying platforms. Co-PIs sit at the University of
      Washington (Hanna Hajishirzi), University of Hawai'i at Hilo (Travis Mandel), University of New Hampshire (Samuel
      Carton), and University of New Mexico (Sarah Dreier). The award is structured as research infrastructure (compute
      time plus open release), not a model-training contract.


      Models trained on the cluster slot into Ai2's existing lineage: OLMo (text language models) and Molmo
      (multimodal). OLMo 3, released November 2025, ships 7B and 32B dense transformer variants with a 65,536-token
      context window, all four variants (Base, Think, Instruct, RL Zero) under Apache 2.0. The training stack is fully
      open: Dolma 3 is a 9.3T-token pretraining corpus combining web text, scientific PDFs, and code repos, of which
      the "Dolma 3 Mix" 5.9T-token subset is what OLMo 3 base models actually train on; Dolmino and Longmino are filtered
      high-quality subsets used for mid-training, and Dolci is the post-training data suite for SFT, DPO, and RLVR.


      What distinguishes Ai2 from "open weights" labs is that the data recipes, training code, intermediate checkpoints,
      and evaluation suites (OLMES, OlmoBaseEval) are released alongside the weights. There is no closed-source corpus
      held back; the model flow can be reproduced or modified end-to-end. The Apache 2.0 license permits commercial use
      without per-token licensing.


      For the open-source AI thesis, OMAI is the largest single U.S. public commitment to fully open foundation-model
      training to date. The structure pairs federal research funding with industry-supplied accelerators rather than
      routing public dollars through a closed lab. It positions Ai2 as one of the few institutions globally (alongside
      European programs like OpenEuroLLM) with both frontier compute and a mandate to release weights, data, and
      training code together.
    sources:
      - title: "Ai2: NSF and NVIDIA partnership announcement"
        url: https://allenai.org/blog/nsf-nvidia
      - title: "Ai2: OMAI compute now live (May 2026)"
        url: https://allenai.org/blog/omai-compute-now-live
      - title: "Ai2: OLMo 3 release"
        url: https://allenai.org/blog/olmo3
      - title: "NVIDIA: Blackwell Ultra HGX B300 supporting Ai2"
        url: https://blogs.nvidia.com/blog/national-science-foundation-ai2-open-ai-models/
  - title: Technical AI Safety RFP
    kind: program
    funder: open-philanthropy
    recipient: Multiple grantees
    date: 2025-04
    amount_usd: 40000000
    amount_label: $40M+
    layers:
      - safety-guardrails
      - evaluation
    region: Global
    url: https://www.openphilanthropy.org/request-for-proposals-technical-ai-safety-research/
    description: Closed April 15, 2025. Distributed across 21 technical safety areas.
    explainer: >-
      Open Philanthropy (now operating as Coefficient Giving) ran a Technical AI Safety request for proposals that
      closed April 15, 2025, planning roughly $40M in grants disbursed over the following five months. The RFP
      partitioned funding across 21 distinct research areas organized into five categories, signaling a deliberately
      wide aperture rather than a single named research bet.


      The five categories are Adversarial Machine Learning (jailbreaks, control evaluations, backdoors and alignment
      stress tests, alternatives to adversarial training, robust unlearning), Exploring Sophisticated LLM Misbehavior
      (alignment faking experiments, encoded reasoning in chain-of-thought and inter-model communication, black-box LLM
      psychology, evaluating hidden dangerous behaviors, reward hacking of human oversight), Model Transparency
      (white-box techniques, activation monitoring, feature representations, toy models, externalized reasoning,
      interpretability benchmarks, more transparent architectures), Trust from First Principles (white-box estimation of
      rare misbehavior, theoretical study of inductive biases), and Alternative Risk Mitigation Approaches (conceptual
      clarity, moonshots for superintelligence alignment).


      Eight areas were starred as funder priorities: jailbreaks and unintentional misalignment, control evaluations,
      backdoors, alternatives to adversarial training, alignment faking experiments, and encoded reasoning in CoT. The
      starred set skews toward empirical work on deceptive or hidden behavior in current frontier models rather than
      longer-horizon theoretical agendas. Grant sizes were not pre-specified; the program absorbed proposals from
      individuals through multi-researcher teams.


      The funder rebranded mid-cycle: the original openphilanthropy.org RFP URL now redirects to coefficientgiving.org.
      The 21-area structure remains the canonical reference grid for what the funder considers in-scope for technical
      safety, and other funders (the Alignment Project, AISF) have echoed similar categorical breakdowns.


      As a single-cycle commitment, the $40M figure made this one of the largest external technical safety pools opened
      in 2025. It is a useful baseline for what mid-eight-figure safety RFPs look like at scale, and the area list is
      downstream-readable as a signal of which topics the largest U.S. AI-safety funder considers tractable.
    sources:
      - title: "Coefficient Giving: Technical AI Safety RFP"
        url: https://coefficientgiving.org/request-for-proposals-technical-ai-safety-research
      - title: "Coefficient Giving: TAIS RFP Research Areas (21 areas listed)"
        url: https://coefficientgiving.org/tais-rfp-research-areas/
      - title: "EA Forum: $40M Available Across 21 Research Areas"
        url: >-
          https://forum.effectivealtruism.org/posts/XtgDaunRKtCPzyCWg/open-philanthropy-technical-ai-safety-rfp-usd40m-available
  - title: FAR.AI / FAR.Futures field-building grant
    kind: project
    funder: open-philanthropy
    recipient: FAR.AI
    date: 2025-04
    amount_usd: 6650000
    amount_label: $6.65M over 2 years
    layers:
      - safety-guardrails
    region: US
    url: https://www.openphilanthropy.org/
    description: Field-building grant for AI safety research community.
    explainer: >-
      FAR.AI (Frontier Alignment Research) is an AI safety research nonprofit founded in July 2022 by Adam Gleave and
      Karl Krueger, headquartered in downtown Berkeley. Open Philanthropy recommended $6.65M over two years specifically
      to scale FAR.Futures, the organization's field-building arm. FAR.AI separately announced over $30M in multi-funder
      commitments in 2025 across its research and field-building lines combined.


      FAR.Futures runs the Alignment Workshop series, which has now hosted events in San Diego, Singapore, Vienna, New
      Orleans, San Francisco, and London. The grant supports expanding the series from two to three events annually and
      extending into Asia and the Global South, plus specialized technical workshops, hackathons, and consensus-building
      forums. A February 2026 deception-focused workshop in San Francisco gathered 25 researchers to specifically work
      on scheming detection and chain-of-thought monitorability.


      FAR.Labs, the Berkeley co-working hub, hosts a weekly FAR.AI Seminar featuring presentations from external
      researchers, streamed remotely. The fellowship and internship pipeline supports 20+ fellows annually with
      mentorship and research opportunities. A separate targeted grants program identifies and scales third-party
      trustworthy-AI research.


      FAR.AI's own research output centers on adversarial robustness and scheming. Their empirical work on robustness
      scaling found that adversarial training is orders of magnitude more compute-efficient than model-size scaling for
      robustness gains, but that the offense-defense balance still favors offense in absolute and relative terms. Their
      Safety Cases line studies vulnerabilities in safety features and develops methodologies to quantify risk levels
      and scaling laws for harm. FAR.AI is also a December 2025 AISF grantee for "Quantifying the Safety-Adversary Gap
      in Large Language Models."


      The Open Philanthropy URL for the field-building grant now redirects to coefficientgiving.org following the
      funder's late-2025 rebrand. Among AI safety nonprofits, FAR.AI is structurally distinctive: it runs convening,
      research, and infrastructure under one roof, with the Berkeley physical hub as connective tissue. The $6.65M grant
      funds the convening and outreach layer specifically, separate from the research grants the organization receives
      elsewhere.
    sources:
      - title: "Coefficient Giving: FAR.AI Field Building (2025)"
        url: https://www.openphilanthropy.org/grants/far-ai-ai-field-building-2025/
      - title: "FAR.AI: $30M+ multi-funder support announcement"
        url: https://www.far.ai/news/30m-multi-funder-support
      - title: "FAR.AI: Programs (FAR.Labs, FAR.Futures, Grantmaking)"
        url: https://www.far.ai/programs
      - title: "FAR.AI: Deception Workshop notes (Feb 2026)"
        url: https://www.far.ai/news/what-we-learned-at-the-far-ai-deception-workshop
  - title: Alignment Project cohort
    kind: program
    funder: aisi-alignment-project
    recipient: 60+ projects (UK)
    date: "2025"
    amount_usd: 35000000
    amount_label: £27M (~$35M)
    layers:
      - safety-guardrails
      - evaluation
    region: UK
    url: https://alignmentproject.aisi.gov.uk/
    description: 60+ alignment projects funded; individual grants up to £1M.
    explainer: >-
      The Alignment Project is a global research fund operated by the UK AI Security Institute (AISI). It launched in
      July 2025 with £15M from AISI and grew to £27M (approximately $35M) by its first-round announcement, with awards
      going to over 60 research projects and individual grants capped at £1M each. A second round is expected to reopen
      in summer 2026.


      The funder coalition is the distinctive feature. Initial backers included the Canadian AI Safety Institute, CIFAR,
      Schmidt Sciences, AWS, Anthropic, Halcyon Futures, the Safe AI Fund, UKRI, and ARIA. OpenAI joined later with
      £5.6M, followed by Microsoft, the Australian Department of Industry's AI Safety Institute, the AI Safety Tactical
      Opportunities Fund, Sympatico Ventures, and Renaissance Philanthropy. The expert advisory board includes Yoshua
      Bengio, Zico Kolter, Shafi Goldwasser, and Andrea Lincoln. Routing OpenAI, Microsoft, Anthropic, and AWS money
      through a UK-government vehicle is uncommon at this scale.


      Research areas span interpretability, scalable oversight, alignment theory, and AI control. The control-specific
      subprogram (documented separately) includes information theory and cryptography (proving theoretical limits on
      what AI systems can hide or prove about their behavior) and computational complexity theory (formal guarantees and
      impossibility results behind scalable oversight protocols). This formal-methods framing is unusual for safety
      grant programs and pulls the cohort toward provable rather than purely empirical work.


      The £1M individual ceiling sits between the typical academic grant tier and the larger cohort-style awards from
      U.S. private funders. It allows the program to fund both small exploratory work and multi-researcher efforts
      inside the same vehicle. AISI staff manage the fund; the grants are explicitly aimed at the external alignment
      research community rather than internal AISI projects.


      As a UK-government-backed program with international applicants and an industry-plus-philanthropic funder base,
      the Alignment Project is the largest public commitment to alignment-specific research outside the United States in
      2025. Its cross-funder structure is structurally closer to the Frontier Model Forum's AISF than to a single-funder
      RFP.
    sources:
      - title: The Alignment Project (UK AISI)
        url: https://alignmentproject.aisi.gov.uk/
      - title: "AISI: Funding 60 projects to advance AI alignment research"
        url: https://www.aisi.gov.uk/blog/funding-60-projects-to-advance-ai-alignment-research
      - title: "UK Gov: OpenAI and Microsoft join Alignment Project coalition"
        url: >-
          https://www.gov.uk/government/news/openai-and-microsoft-join-uks-international-coalition-to-safeguard-ai-development
      - title: "Alignment Forum: Research Areas in AI Control"
        url: >-
          https://www.alignmentforum.org/posts/rGcg4XDPDzBFuqNJz/research-areas-in-ai-control-the-alignment-project-by-uk
  - title: AI2050 Fellows cohort
    kind: program
    funder: schmidt-sciences
    recipient: Multiple researchers
    date: "2025"
    amount_usd: 18000000
    amount_label: $18M cohort
    layers:
      - safety-guardrails
      - evaluation
      - governance
    region: Global
    url: https://www.schmidtsciences.org/2025-ai2050-fellows-announcement/
    description: Annual AI2050 fellowships program.
    explainer: >-
      AI2050 is a Schmidt Sciences fellowship initiative co-chaired by Eric Schmidt and James Manyika. The 2025 cohort,
      announced November 5, 2025, named 21 Early Career Fellows and 7 Senior Fellows, totaling $18M in three-year awards.
      With this cohort, AI2050 reaches 99 fellows across 8 countries and 42 institutions across its four announced
      cycles.


      Early Career awards target postdocs and pre-tenure faculty doing multidisciplinary, hard-to-fund research. The
      2025 Early Career list includes Zongyi Li (NYU incoming, neural operators for scientific computing), Tess Smidt (MIT
      EECS, equivariant ML), Surbhi Goel (Penn CIS, theoretical foundations for why modern AI works and fails), Brian
      Hie (Stanford), Natasha Jaques (Washington), Martin Schrimpf, Lindsey Raymond (joining MIT EECS / Economics /
      Schwarzman College in 2026), and Ellen Zhong (Princeton).


      Senior Fellows are selected by closed nomination with no application path. The 2025 Senior cohort includes Surya
      Ganguli (Stanford, developing a scientific foundation for explainable AI through analytical theories of diffusion
      models and reasoning systems), Luke Zettlemoyer (Washington, NLP), and Krishna Pillutla (IIT Madras,
      privacy-preserving fine-tuning and reasoning methods to prevent privacy-sensitive leakage from foundation models).


      The thematic scope is broader than safety: research topics span AI scientists, safer and more reliable models, AI
      for biological and medical discovery, and theoretical foundations. AI2050 sits adjacent to but distinct from
      Schmidt Sciences' AI Safety Science program, which funds projects rather than individuals and has a tighter
      safety-specific frame.


      For sovereignty-minded readers, AI2050 is one of the principal individual-researcher fellowships funded by a
      single U.S. private donor at this scale. The selection skew toward academic researchers (versus industry labs) and
      the multi-year structure pushes against the short-cycle, milestone-driven pattern that dominates most AI funding.
      The cohort year-over-year growth (now 99 fellows total) makes it a useful index of who Schmidt Sciences considers
      a key academic AI researcher worth multi-year support.
    sources:
      - title: "Schmidt Sciences: 2025 AI2050 Fellows announcement ($18M)"
        url: https://www.schmidtsciences.org/2025-ai2050-fellows-announcement/
      - title: AI2050 program page (Schmidt Sciences)
        url: https://ai2050.schmidtsciences.org/
      - title: "MIT News: MIT affiliates named 2025 AI2050 Fellows"
        url: https://news.mit.edu/2025/mit-affiliates-named-schmidt-sciences-ai2050-fellows-1208
      - title: "Penn Engineering: Surbhi Goel 2025 AI2050 Early Career Fellow"
        url: https://www.seas.upenn.edu/stories/surbhi-goel-named-2025-schmidt-sciences-ai2050-early-career-fellow/
  - title: AI Safety Science program
    kind: program
    funder: schmidt-sciences
    recipient: 27 projects
    date: 2025-02
    amount_usd: 10000000
    amount_label: $10M / 27 projects
    layers:
      - safety-guardrails
    region: Global
    url: https://www.schmidtsciences.org/trustworthy-ai/
    description: >-
      Cohort includes Bengio, Kolter, Tramer, Narasimhan, Narayanan, Raghunathan, Kumar, Bajcsy. Average ~$370K per
      project.
    explainer: >-
      Schmidt Sciences announced the AI Safety Science program in February 2025, selecting 27 projects with $10M total,
      an average of approximately $370K per project. The funder framing is the "Science of Trustworthy AI," with grants
      targeting concrete, implementable technical methods for testing and evaluating large language models so they are
      less likely to cause harm or be misused.


      Featured awardees include Yoshua Bengio (Mila, Quebec AI Institute) on AI risk mitigation technology, Zico Kolter
      (Carnegie Mellon, also an OpenAI board member), Florian Tramèr and Mrinmaya Sachan (ETH Zurich), Andrea Bajcsy
      (Carnegie Mellon), Arvind Narayanan (Princeton), Karthik Narasimhan, Aditi Raghunathan (CMU), Daniel Kang and Bo
      Li (UIUC), Huan Sun (Ohio State), and Ziang Xiao (Johns Hopkins). The roster skews toward established alignment
      and ML-safety faculty rather than early-career researchers.


      The project portfolio organizes into themes around understanding safety in AI systems and inference-time compute.
      Named projects include "Tests of Compositional Generalization as an Upper Bound on AI Safety Risks," "LLM-Derived
      Guardrail for Frontier Models as a Step Towards a Cautious Scientist AI," "Mechanistic Interpretability to Detect
      Test Set Contamination," "Five Nines of Reliability for AI Agents," "OpenAgentSafety: Measuring and Mitigating
      Safety Harms," "Formalizing Prompt Injection Defenses," and "Tracing and Eliminating Harmful Capabilities Across
      Model Generations."


      Program operations include computational support from the Center for AI Safety and API access from OpenAI to
      grantees, which lowers the marginal cost of empirical safety research that needs frontier-model queries. This
      structural detail (compute + API access bundled with cash) is unusual and partially substitutes for what
      individual labs would otherwise spend on inference budgets.


      Compared with the parallel AI2050 fellowship program, AI Safety Science funds projects rather than individuals and
      has a tighter thematic frame. Together the two programs make Schmidt Sciences one of the largest non-government
      AI-safety funders of the 2025 cohort year. A 2026 follow-on Trustworthy AI RFP has been announced through Schmidt
      Sciences' grants pipeline.
    sources:
      - title: "Schmidt Sciences: $10M AI Safety Science announcement"
        url: https://www.schmidtsciences.org/new-10-million-ai-safety-science-program-launched-for-foundational-research/
      - title: "Schmidt Sciences: Science of Trustworthy AI program page"
        url: https://www.schmidtsciences.org/trustworthy-ai/
      - title: "Schmidt Sciences: AI Safety Science awardees and projects"
        url: https://www.schmidtsciences.org/safetyscience/
      - title: "CMU: Kolter joins $10M AI Safety Science"
        url: https://www.cs.cmu.edu/news/2025/kolter-ai-safety-science
  - title: AI Safety Fund Dec 2025 round
    kind: program
    funder: frontier-model-forum-aisf
    recipient: 11 grantees including Apollo Research, Caltech BioSentinel, Institute for Decentralized AI, Faculty AI
    date: 2025-12
    amount_usd: 5000000
    amount_label: ">$5M / 11 grantees"
    layers:
      - safety-guardrails
      - agents
    region: Global
    url: https://www.frontiermodelforum.org/updates/announcement-of-new-ai-safety-fund-grantees/
    description: >-
      Industry-consortium safety fund. Focus on scheming detection, biosecurity, decentralized AI oversight, automated
      red-teaming.
    explainer: >-
      The Frontier Model Forum's AI Safety Fund (AISF) is a multi-lab consortium fund jointly underwritten by frontier
      model developers, distinct from any single lab's internal grant program. The December 2025 round disbursed more
      than $5M across 11 grantees with thematic scope spanning scheming detection, biosecurity, decentralized AI
      oversight, cybersecurity evaluations, and multi-agent safety.


      The 11 named grantees and their projects are: Apollo Research ("Building black box scheming monitors for Frontier
      AI agents"); California Institute of Technology ("AI-driven Detection of Protein Mimetic Biothreats with
      BioSentinel"); Institute for Decentralized AI, operated by the Cosmos Institute ("Scalable, Decentralized
      Oversight for Multi-Agent Networks"); Faculty AI ("Automated Red-Teaming for Biosecurity Risks"); FAR.AI
      ("Quantifying the Safety-Adversary Gap in Large Language Models"); FutureHouse, Inc. ("Pioneering AI-Driven
      Experimental Design: Benchmarks for Responsible Innovation"); Morgan State University (comparative analysis of
      human cybersecurity performance with and without AI tools); Nemesys Insights LLC ("ICS Benchmark and Human Uplift
      Study"); SecureBio (evaluations of agent AIs executing large-scale-harm tasks); University of Illinois
      Urbana-Champaign (cybersecurity risk evaluations of AI agents with computer interaction); and University of
      Toronto ("Analyzing the Emergent Role of Sanctioning in Regulating Multi-Agent LLM Systems").


      The biosecurity sub-cohort (Caltech BioSentinel, Faculty AI, SecureBio, plus the Apollo and Nemesys cyber work)
      tracks the AI-bio risk thread that AISF has emphasized across rounds. Apollo Research's black-box scheming monitor
      work and FAR.AI's safety-adversary gap project address the deception-and-control problem from complementary
      angles: behavioral monitoring versus adversarial measurement. The Institute for Decentralized AI grant is the
      structural outlier, funding oversight frameworks for networks of agents that do not run inside a single trust
      boundary.


      AISF routes industry capital from Anthropic, Google, Microsoft, and OpenAI (the original Frontier Model Forum
      members) through a neutral consortium toward external researchers, with funding decisions and grant administration
      handled at consortium level rather than by any individual member. Compared to single-funder safety RFPs of similar
      size, the structure is a useful precedent for how frontier-lab money can reach the wider safety field without
      routing through one lab's brand.


      The fund's earlier rounds focused heavily on biosecurity; the December 2025 round broadened into scheming
      detection and multi-agent governance, suggesting a deliberate widening of scope as more empirical work in those
      areas becomes tractable.
    sources:
      - title: "FMF: Announcement of new AI Safety Fund Grantees (Dec 2025)"
        url: https://www.frontiermodelforum.org/updates/announcement-of-new-ai-safety-fund-grantees/
      - title: "FMF: AI Safety Fund program page"
        url: https://www.frontiermodelforum.org/ai-safety-fund/
      - title: "FMF: Grant-Making to Address AI-Bio Risk Challenges"
        url: https://www.frontiermodelforum.org/updates/latest-from-the-fmf-grant-making-to-address-ai-bio-risk-challenges/
  - title: Democracy x AI Cohort 2026
    kind: program
    funder: mozilla
    recipient: 10 teams
    date: 2026-02
    amount_usd: 1250000
    amount_label: $1M / 10 teams + $250K Sustain Track
    layers:
      - governance
      - agents
      - sovereignty-decentralization
    region: Global
    url: https://www.mozillafoundation.org/en/what-we-do/grantmaking/incubator/democracy-ai-cohort/
    description: 10 teams at $50K each plus a $250K Sustain Track top-up. Focus on civic AI infrastructure.
    explainer: >-
      Mozilla Foundation's Democracy x AI Cohort 2026 is a 12-month incubator program with a two-track funding
      structure. The Build Track funds 10 selected projects at $50,000 each ($500K total). The Sustain Track advances
      the strongest Build projects to a Tier II award of $250,000 per project for long-term sustainability work,
      bringing maximum per-team support to $300,000. Selections are announced mid-June 2026 with the cohort launching
      that same month.


      Application timeline: initial proposals opened February 12, 2026, with the initial deadline March 16, 2026 at
      11:59pm PT. Finalists are notified April 16, with full proposals due April 30. Selection criteria require
      functioning technology with demonstrated user adoption (not ideas or wireframes), a team committed to executing
      over 12 months, and a commitment to openness through open-source code, shared learnings, or public datasets.
      Organizations must be eligible to receive U.S. nonprofit funding: 501(c)(3) nonprofits, international equivalents,
      or for-profit social enterprises evaluated case-by-case.


      The three program categories are: Enable Better Information (systems for assessing information quality, verifying
      sources collectively, and understanding algorithmic influence); Build Institutional Transparency (legislative
      monitoring, public data infrastructure, participatory decision-making tools); and Protect Civic Space
      (privacy-preserving tools for activists and marginalized communities to organize safely while resisting
      surveillance and authoritarian control). The third category is the one most directly relevant to
      sovereignty-and-rights framings.


      Selected projects receive monthly cohort calls, expert mentorship, tailored workshops, access to Mozilla's network
      of technologists, activists, and funders, and potential pitching opportunities at Mozilla Festival. The non-cash
      support is a meaningful share of total program value at this dollar tier.


      The "AI as core capability, not an add-on" requirement is the discriminating feature: Mozilla wants projects where
      AI is structurally necessary for democratic impact at scale, not retrofitted onto existing civic-tech work. Among
      2026 cohort-style programs, Democracy x AI is one of the few with explicit governance and civic framing rather
      than a generic open-source or safety frame, which makes it a useful reference for funders thinking about AI's
      intersection with democratic institutions.
    sources:
      - title: "Mozilla Foundation: Democracy x AI Cohort 2026"
        url: https://www.mozillafoundation.org/en/what-we-do/grantmaking/incubator/democracy-ai-cohort/
      - title: "Granted AI: Mozilla Democracy x AI $50K Grants"
        url: https://grantedai.com/blog/mozilla-democracy-ai-cohort-50k-grants-2026
  - title: NGI Zero Commons Fund April 2026 round
    kind: program
    funder: nlnet
    recipient: 57 projects
    date: 2026-04
    amount_usd: 1500000
    amount_label: €1.4M (~$1.5M) across 57 projects
    layers:
      - protocols
      - identity-trust
      - governance
    region: EU
    url: https://nlnet.nl/news/2026/20260409-announce-commons-fund.html
    description: Bi-monthly Commons Fund call. Recent rounds skew protocols / open data / trusted open hardware.
    explainer: >-
      NLnet Foundation announced the April 9, 2026 NGI Zero Commons Fund round (the ninth open call) with 57 free and
      open source projects funded for a total of approximately €1.4M (~$1.5M). NLnet operates the Commons Fund as a
      rolling bi-monthly call with grants between €5,000 and €50,000 per project (with scale-up available), making it
      one of the few EU-level public funders running a sustained small-grants pipeline.


      The 57-project portfolio skews three ways: trustworthy hardware and manufacturing (10 projects including Topola
      Autoplacer for PCB component placement, BrailleRAP open-source Braille embosser, GLOW-SG13G2 digital standard cell
      library for chip design, Padne power delivery network analysis, PowerCommons OpenPower processor core revival, and
      Yanartas open-source hardware security module); network infrastructure (Bromal lightweight Matrix server, mgmt
      config automation, YunoHost self-hosting with OIDC); and software engineering and protocols (13 projects including
      Python OpenPGP library, XMPP-Matrix gateway, SPARQL query evaluation tools, and protocol verification). Operating
      systems and firmware (6 projects, including LinuxBoot, bhyve hypervisor, Managarm microkernel) and
      data/AI/analysis (8 projects including document conversion, satellite imagery aggregation, PDF redaction) round
      out the cohort, with 17 user-facing applications including federated video platform Loops and DAW Zrythm.


      Funding is from the European Commission's Next Generation Internet programme via DG CNECT (grant agreement No.
      101135429) and the Swiss State Secretariat for Education, Research and Innovation. NLnet's overall NGI Zero
      commitment for 2026 through 2027 is €21.6M across all open calls. Projects must publish under a free or open
      source license; outputs become part of the European digital commons. The thirteenth call opened April 1, 2026 with
      a deadline of June 1, 2026 at 12:00 CEST.


      Eligibility is open to individuals and organizations of any type, which means the small-grant tier reaches solo
      maintainers and tiny collectives that mainstream grant pipelines cannot underwrite. The result is a pipeline that
      funds protocol-layer, hardware, and digital-commons work mostly invisible to U.S. AI-funding discussions but
      central to the EU's digital sovereignty story.


      For a sovereignty-minded reader, NGI Zero is among the few EU-scale public funders running both the protocol and
      hardware layers as first-class targets rather than as add-ons to a model-funding pipeline. The bi-monthly cadence
      (six-plus calls per year) makes the program a usable continuous funding source for open-source maintainers rather
      than a one-shot RFP.
