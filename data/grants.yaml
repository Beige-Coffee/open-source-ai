  - title: AISI Inspect framework
    kind: project
    funder: aisi-alignment-project
    recipient: Open release
    date: "2025"
    amount_label: Internal funding; open release
    layers:
      - safety-guardrails
      - evaluation
    region: UK
    url: https://www.aisi.gov.uk/work
    description: Open-sourced evaluation harness from UK AISI; available for community use.
    explainer: >-
      The UK AI Security Institute open-sourced its Inspect evaluation framework in 2025, releasing the same harness
      that AISI uses internally to run capability and safety evaluations on frontier models. Inspect provides a common
      interface for writing evals, running them across models, and aggregating results.


      Releasing the harness rather than only the eval results lets outside teams reproduce AISI's testing methodology
      and run their own benchmarks against the same scaffold. It has become one of the more widely adopted open
      evaluation frameworks for safety-relevant tasks, partly because it is maintained by a government lab with no
      commercial incentive to favor a particular model family.
    sources:
      - title: UK AI Security Institute work
        url: https://www.aisi.gov.uk/work
  - title: "Sovereign Tech Fund: OpenSSH, curl, GNU coreutils maintenance"
    kind: program
    funder: sovereign-tech-fund
    recipient: Foundational open-source maintainers
    date: 2024-2026
    amount_usd: 24900000
    amount_label: €23M+ (~$24.9M) across 60 technologies in 2 years
    layers:
      - runtime
      - governance
    region: EU
    url: https://www.sovereigntechfund.de/
    description: >-
      Funds critical infrastructure dependencies. Cross-cuts into AI runtime because many AI servers depend on these
      underlying tools.
    explainer: >-
      Germany's Sovereign Tech Fund disbursed more than €23M (about $24.9M) across 60 technologies over two years, with
      the program funding maintenance of critical open-source dependencies rather than new feature work. OpenSSH and
      curl were among the nine pilot projects funded in the first round, and the portfolio also includes GNU coreutils
      via the Rust coreutils effort.


      The fund is not an AI program, but its work cross-cuts AI infrastructure because most AI servers, training
      clusters, and model-serving stacks depend on these underlying tools. A coreutils or OpenSSH security incident
      would propagate through the entire AI runtime supply chain. The Sovereign Tech Fund is one of the few state actors
      that funds this layer explicitly, on the theory that strategic digital infrastructure should not depend on
      volunteer maintainers in their spare time.
    sources:
      - title: "Phoronix: STF Two Years $24.9M"
        url: https://www.phoronix.com/news/STF-Two-Years-24.9M-USD
      - title: "Sovereign Tech Agency: Our First Year"
        url: https://www.sovereign.tech/news/our-first-year
  - title: MCP donation to Linux Foundation AAIF
    kind: project
    funder: linux-foundation-aaif
    recipient: Model Context Protocol project
    date: 2025-12
    amount_label: In-kind / governance handoff
    layers:
      - protocols
    region: Global
    url: https://www.linuxfoundation.org/press/linux-foundation-announces-the-formation-of-the-agentic-ai-foundation
    description: >-
      Anthropic donated MCP stewardship to Linux Foundation's new Agentic AI Foundation, alongside goose (Block) and
      AGENTS.md (OpenAI). Industry-consortium governance model.
    explainer: >-
      On December 9, 2025, Anthropic donated stewardship of the Model Context Protocol to the Linux Foundation's newly
      formed Agentic AI Foundation. The donation moved MCP from single-vendor governance under Anthropic to a neutral
      foundation structure, with the protocol's specification, reference implementations, and trademark transferring to
      the foundation.


      MCP was not donated alone. The Agentic AI Foundation also received goose from Block and AGENTS.md from OpenAI as
      founding contributions, giving the new foundation three protocol and tooling projects from three different vendors
      at launch. The arrangement follows the industry-consortium model used by the Cloud Native Computing Foundation and
      other Linux Foundation projects, where competing vendors share governance of standards they all rely on.
    sources:
      - title: Linux Foundation announces Agentic AI Foundation
        url: https://www.linuxfoundation.org/press/linux-foundation-announces-the-formation-of-the-agentic-ai-foundation
  - title: Maple AI
    kind: project
    funder: hrf
    recipient: OpenSecret
    date: "2025-11-24"
    amount_label: Undisclosed
    layers:
      - runtime
      - identity-trust
      - agents
    region: US
    url: https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/
    description: >-
      Open-source, end-to-end encrypted AI assistant built by OpenSecret using secure enclaves and confidential
      computing. Activists in authoritarian environments can use frontier LLMs without their queries being scanned,
      stored, or handed to governments. HRF support funds capability improvements and new features for activist research
      workflows.
    explainer: >-
      HRF awarded Maple AI in the November 24, 2025 AI for Individual Rights program round, the foundation's first
      dedicated AI grant cohort. Maple AI is an open-source, end-to-end encrypted assistant built by OpenSecret that
      runs frontier model inference inside secure enclaves with confidential computing, so user queries are not scanned,
      stored, or made accessible to the inference provider or the operating government.


      The grant funds capability improvements and new features for activist research workflows. The target user is a
      journalist or organizer in an authoritarian environment who needs frontier-quality LLM help without giving an
      external provider an unencrypted log of every prompt. HRF's framing positions Maple AI alongside other
      freedom-tech tools in its portfolio, with the secure-enclave architecture as the structural defense against
      subpoena or coercion of the provider.
    sources:
      - title: HRF announces AI for Individual Rights support
        url: https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/
      - title: HRF AI for Individual Rights program
        url: https://hrf.org/program/ai-for-individual-rights/
  - title: Routstr
    kind: project
    funder: hrf
    recipient: Sovereign Engineering / Routstr team
    date: "2025-11-24"
    amount_label: Undisclosed
    layers:
      - protocols
      - sovereignty-decentralization
      - runtime
    region: Global
    url: https://hrf.org/latest/hrf-announces-support-for-projects-advancing-ai-for-individual-rights/
    description: >-
      LLM routing marketplace built on the Nostr decentralized communications protocol. Users connect pseudonymously to
      buy and sell access to each other's AI accounts in an uncensorable peer-to-peer marketplace, giving activists
      inference even when governments or corporate providers block them.
    explainer: >-
      HRF awarded Routstr in the November 24, 2025 AI for Individual Rights round. Routstr is an LLM routing marketplace
      built on Nostr, the decentralized communications protocol, that lets users pseudonymously buy and sell access to
      inference accounts in a peer-to-peer market rather than going through a centralized provider.


      The project was built during a Sovereign Engineering cohort in Madeira (SEC-05) and is maintained by the Sovereign
      Engineering and Routstr teams. The design intent is censorship resistance: when a national government or a
      corporate provider blocks an activist's access to a model, Routstr allows continued inference by routing through
      other participants who still have access. The marketplace structure prices that capacity rather than relying on
      volunteer donation of accounts.
