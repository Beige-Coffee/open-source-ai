      Recall is built as an Interplanetary Consensus (IPC) subnet and integrates Filecoin decentralized storage as the
      substrate for agent state and provenance. The architecture places agent memory and audit trails on a verifiable
      storage layer rather than in opaque centralized databases.


      The project spans the data, agents, and identity-trust layers: it treats verifiable agent behavior as a function
      of where the underlying state is stored and who can attest to it.
    sources:
