        url: https://podcasts.apple.com/us/podcast/kubeflow-1-0-with-jeremy-lewi/id1370049232?i=1000467355766
  - title: Theia AI IDE
    kind: project
    funder: mozilla
    recipient: Eclipse Foundation / Theia
    date: "2024-09-23"
    amount_usd: 100000
    amount_label: Up to $100K
    layers:
      - agents
      - runtime
    region: EU
    url: https://blog.mozilla.org/en/mozilla/14-ai-projects-to-watch-mozillas-first-builders-accelerator-cohort-kicks-off/
    description: >-
      Extension of the Eclipse Theia editor giving developers a transparent, customizable AI experience with the freedom
      to choose and self-host language models.
    explainer: >-
      The Theia AI IDE is an AI-extended distribution of Eclipse Theia, the cross-platform editor framework hosted at
      the Eclipse Foundation and primarily developed by EclipseSource. The project is led by Jonas Helming. Theia itself
      is a TypeScript desktop and browser IDE shell competitive with VS Code; Theia AI is a higher-level framework on
      top of that shell that gives tool vendors an opinionated way to add LLM-backed features without locking into one
      vendor's cloud.


      The framework's core abstraction is the Agent: a configured combination of a prompt template, a set of variables
      that hydrate the template at runtime, a list of tool functions the LLM may call, and a chosen LLM provider.
      Variants and reusable prompt fragments let vendors compose agents from shared building blocks and ship runtime
      modifications without rebuilding the IDE. As of Theia 1.58 (February 2025), tool function calling is supported
      across Anthropic and Ollama in addition to the earlier OpenAI support, and Theia 1.63 added image inputs for
      vision-capable models. Universal LLM support spans OpenAI, Anthropic, Google AI, Ollama, Mistral, and Deepseek.


      Theia AI added Model Context Protocol (MCP) support in December 2024, so that the same external context sources
      and tool servers built for Anthropic's Claude clients can plug into Theia agents. The chat surface includes
      follow-up suggestions, structured questions, and change sets (proposed multi-file edits the user can accept or
      reject as one unit), and the framework supports agent-to-agent delegation for multi-agent workflows.


      The Mozilla Builders Accelerator selection on September 23, 2024 placed Theia AI in the first cohort with funding
      of up to $100K. In the stack the project sits at the agents and runtime layers. The thesis it tests is whether an
      open, vendor-neutral copilot framework can match the integration quality of proprietary IDE assistants when
      developers want to self-host the model and inspect the prompt.
    sources:
