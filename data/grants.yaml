    description: Compute-heavy fellowship program for alignment research.
    explainer: >-
      The Anthropic Fellows May 2026 cohort is a compute-heavy alignment research fellowship that pays a $3,850 weekly
      stipend, provides roughly $15,000 per month in compute per fellow, and runs for four months. Fellows work on
      safety problems under Anthropic mentorship, with the program positioned as an on-ramp for researchers building
      toward full-time alignment work.


      The structure favors empirical projects that need real model access, which is the main reason the compute
      allocation is sized separately from the stipend. Past cohorts have produced published interpretability and evals
