    description: >-
      Provides hands-on consultation to activists in HRF's network, helping them refine prototypes into deployable
      applications. Acts as a bridge between human-rights defenders and the technical talent needed to launch tools in
      production.
    explainer: >-
      The Human Rights Foundation funded The Bridge Project on November 24, 2025, as one of eight grantees in the first
      round of its AI for Individual Rights program. The grant funds technical consultation to activists in HRF's
      network who have prototyped tools but need help turning them into reliable applications that can be deployed in
      the field.


      The Bridge Project sits at a specific gap inside HRF's portfolio. The foundation's other AI-track programming (the
      AI Hack for Freedom hackathons, the AI for Individual Rights newsletter, and HRF's "vibe coding for human rights"
      workshops) has emphasized that modern coding-assistant tools make it possible for non-engineer activists to
      prototype useful applications quickly. The bottleneck is the next step: hardening a prototype into something that
      handles authentication, key management, error states, threat-modeled storage, and platform-store distribution. The
      Bridge Project is structured as a consultancy that works inside that gap, pairing activist-built prototypes with
      the engineering effort needed to ship them.


      Public material on The Bridge Project is limited to the HRF announcement and HRF's program-level commentary on
      activist tool deployment. The grant should be read as program infrastructure rather than a single product: it
      makes the rest of the AI for Individual Rights portfolio more useful by ensuring that prototypes coming out of
      hackathons and cohorts do not stall before reaching users. Individual grant amounts in the first round were not
      disclosed.
