    lineage:
      parent: llama-3-1-70b-instruct
      note: Same base; post-training refresh closed much of the 70B-vs-405B gap.
    recommended_use_cases:
      - mid-tier production deployment
      - code assistance
      - general chat at 70B cost
    long_form: >-
      Llama 3.3 70B is what happens when a lab spends six months on post-training the same base checkpoint. Meta did not release a new pretrain in December 2024; they released a re-trained 70B that
      reached benchmark scores within range of the 405B sibling on MMLU and HumanEval, at a fraction of the deployment cost. The recipe (published only in the model card, not a paper) emphasized
      synthetic data from the 405B teacher, additional preference data, and refined rejection sampling. The release lands at an interesting moment for the open-weights story: 70B-class checkpoints
      from Meta, Qwen, DeepSeek, and Mistral are now close enough on most benchmarks that license, vendor support, and inference economics matter more than capability deltas. Llama 3.3 70B became the
      default 70B-class checkpoint through 2025 for most production workloads where Apache-2.0 was not a hard requirement. It is also the final dense Llama: the Llama 4 family that followed in April
      2025 went MoE, following DeepSeek V3 and Qwen 3.
    known_limitations:
      - text: Still under Llama Community License, not OSI-approved.
        source: https://github.com/meta-llama/llama-models/blob/main/models/llama3_3/LICENSE
