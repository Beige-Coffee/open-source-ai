      same time. Released in March 2025, it folded together Google's investments in long-context modeling (the 1M-token
      native window had been a Gemini differentiator since 1.5 Pro the previous February) and the reasoning-model wave
      o1 and R1 had established. The pricing structure (input under $1.25/M for prompts up to 200K, $2.50/M above;
      output at $10/M with extended thinking included) made it cheaper than Claude 3.7 Sonnet at the headline input rate
      but more expensive at high output volumes, which split the market between the two for production workloads. Google
      also published the Gemini 2.5 family across Pro, Flash, and Flash-Lite, with the smaller variants positioning
      aggressively against open-weights MoE on cost. Gemini's lasting differentiator through 2025 remained its
      multimodal handling (vision, video, and audio integrated more deeply than competing closed frontiers) and its
      native long-context performance, where benchmarks measuring needle-in-a-haystack retrieval at 1M tokens
      consistently favored Gemini 2.5 Pro over peers.
